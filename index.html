// ===== GENERIC / EXTRA DRAW FUNCTIONS =====
function monHash(str){ let h=0; for (let i=0;i<str.length;i++){ h=(h*31 + str.charCodeAt(i))>>>0; } return h; }

// Generic creature drawer for the many monster types without bespoke art.
// Picks a colour + archetype from a hash of the id; bosses are larger with an aura + crown.
function drawGenericMonster(x, y, m){
  const h = monHash(m.id||m.name||'x');
  const hue = h % 360;
  const arche = h % 5;
  const boss = m.boss;
  const s = boss ? 1.7 : 1;
  const body = `hsl(${hue},48%,${boss?38:48}%)`;
  const dark = `hsl(${hue},48%,${boss?22:30}%)`;
  const light = `hsl(${hue},60%,64%)`;
  if (boss) { ctx.globalAlpha = 0.18; ctx.fillStyle = `hsl(${hue},75%,52%)`; ctx.beginPath(); ctx.arc(x, y, 24*s, 0, Math.PI*2); ctx.fill(); ctx.globalAlpha = 1; }
  if (arche === 0) {
    // four-legged beast
    ctx.fillStyle = body; ctx.beginPath(); ctx.ellipse(x, y+2, 10*s, 6*s, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = dark; ctx.fillRect(x-8*s, y+6*s, 2.5*s, 6*s); ctx.fillRect(x-3*s, y+6*s, 2.5*s, 6*s); ctx.fillRect(x+2*s, y+6*s, 2.5*s, 6*s); ctx.fillRect(x+6*s, y+6*s, 2.5*s, 6*s);
    ctx.fillStyle = light; ctx.beginPath(); ctx.ellipse(x+9*s, y-2*s, 5*s, 4*s, -0.2, 0, Math.PI*2); ctx.fill();
  } else if (arche === 1) {
    // humanoid
    ctx.fillStyle = body; ctx.fillRect(x-6*s, y-6*s, 12*s, 13*s);
    ctx.fillStyle = dark; ctx.fillRect(x-5*s, y+7*s, 4*s, 7*s); ctx.fillRect(x+1*s, y+7*s, 4*s, 7*s);
    ctx.fillRect(x-9*s, y-4*s, 3*s, 9*s); ctx.fillRect(x+6*s, y-4*s, 3*s, 9*s);
    ctx.fillStyle = light; ctx.beginPath(); ctx.arc(x, y-10*s, 5*s, 0, Math.PI*2); ctx.fill();
  } else if (arche === 2) {
    // crystal / elemental diamond
    ctx.fillStyle = body; ctx.beginPath(); ctx.moveTo(x, y-13*s); ctx.lineTo(x+10*s, y); ctx.lineTo(x, y+12*s); ctx.lineTo(x-10*s, y); ctx.closePath(); ctx.fill();
    ctx.fillStyle = light; ctx.beginPath(); ctx.moveTo(x, y-8*s); ctx.lineTo(x+5*s, y); ctx.lineTo(x, y+6*s); ctx.lineTo(x-5*s, y); ctx.closePath(); ctx.fill();
  } else if (arche === 3) {
    // blob / insect
    ctx.fillStyle = body; ctx.beginPath(); ctx.arc(x, y, 10*s, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = dark; ctx.lineWidth = 1.5;
    for (let i=0;i<3;i++){ ctx.beginPath(); ctx.moveTo(x-8*s, y-4*s+i*5*s); ctx.lineTo(x-14*s, y-6*s+i*6*s); ctx.stroke(); ctx.beginPath(); ctx.moveTo(x+8*s, y-4*s+i*5*s); ctx.lineTo(x+14*s, y-6*s+i*6*s); ctx.stroke(); }
  } else {
    // winged / dragon
    ctx.fillStyle = `hsla(${hue},55%,55%,0.6)`;
    ctx.beginPath(); ctx.moveTo(x-2*s, y-2*s); ctx.lineTo(x-13*s, y-12*s); ctx.lineTo(x-3*s, y+2*s); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(x+2*s, y-2*s); ctx.lineTo(x+13*s, y-12*s); ctx.lineTo(x+3*s, y+2*s); ctx.closePath(); ctx.fill();
    ctx.fillStyle = body; ctx.beginPath(); ctx.ellipse(x, y+2, 8*s, 6*s, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = light; ctx.beginPath(); ctx.ellipse(x+7*s, y-4*s, 4*s, 3*s, -0.3, 0, Math.PI*2); ctx.fill();
  }
  // glowing eyes
  ctx.fillStyle = boss ? '#ffe23a' : '#ff3b2e';
  ctx.beginPath(); ctx.arc(x-2.5*s, y-(arche===1?10:3)*s, 1.6*s, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+2.5*s, y-(arche===1?10:3)*s, 1.6*s, 0, Math.PI*2); ctx.fill();
  // boss crown
  if (boss) {
    ctx.fillStyle = '#ffd700';
    const cy = y - 17*s;
    ctx.beginPath();
    ctx.moveTo(x-9, cy+6); ctx.lineTo(x-9, cy); ctx.lineTo(x-4.5, cy+4); ctx.lineTo(x, cy-3);
    ctx.lineTo(x+4.5, cy+4); ctx.lineTo(x+9, cy); ctx.lineTo(x+9, cy+6); ctx.closePath(); ctx.fill();
  }
}

// Draw the player's equipped weapon in-hand (right side ~ px+8)
function drawWeapon(c, px, py){
  const wi = G.inv.find(i => i.equipped && ITEMS[i.itemId] && ITEMS[i.itemId].slot === 'weapon');
  if (!wi) { // no weapon -> fists
    ctx.fillStyle = '#ddbba0';
    ctx.beginPath(); ctx.arc(px+9, py+4, 2.5, 0, Math.PI*2); ctx.fill();
    return;
  }
  const it = ITEMS[wi.itemId];
  const id = wi.itemId;
  const fancy = (wi.luck || (wi.exc && wi.exc.length));
  const isStaff = it.magic || /staff/.test(id);
  const isBow = /bow/.test(id);
  if (isStaff) {
    // staff shaft + orb
    ctx.strokeStyle = fancy ? '#ffd700' : '#9b7340'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(px+8, py-12); ctx.lineTo(px+8, py+10); ctx.stroke();
    ctx.fillStyle = fancy ? '#ffe680' : '#66ccff';
    ctx.globalAlpha = 0.9; ctx.beginPath(); ctx.arc(px+8, py-14, 4, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 0.3; ctx.beginPath(); ctx.arc(px+8, py-14, 7, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  } else if (isBow) {
    // bow arc + string
    ctx.strokeStyle = fancy ? '#ffd700' : '#a0703a'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(px+9, py-1, 12, -Math.PI*0.5, Math.PI*0.5); ctx.stroke();
    ctx.strokeStyle = fancy ? '#fff3b0' : '#ddd'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(px+9, py-13); ctx.lineTo(px+9, py+11); ctx.stroke();
  } else {
    // sword / blade
    ctx.strokeStyle = fancy ? '#fff0a0' : '#d8d8e8'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(px+8, py+4); ctx.lineTo(px+15, py-14); ctx.stroke();
    ctx.strokeStyle = fancy ? '#ffd700' : '#8a6a2a'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(px+5, py+3); ctx.lineTo(px+11, py+1); ctx.stroke(); // crossguard
    if (fancy) { ctx.globalAlpha = 0.25; ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 5; ctx.beginPath(); ctx.moveTo(px+8, py+4); ctx.lineTo(px+15, py-14); ctx.stroke(); ctx.globalAlpha = 1; }
  }
}

// Shared humanoid drawer used for the companion ("fake player") and ghost players.
// Mirrors drawPlayer's proportions so they are visually indistinguishable from the
// real player, and adds optional walk + attack animation and transparency.
//   opts: { alpha, moving, phase (walk cycle), bobSeed (idle phase), atk (0..1),
//           weapon ('sword'|'staff'|'bow'), nameColor, tag, tagColor }
function drawHumanoid(px, py, color, name, level, opts){
  opts = opts || {};
  const alpha = (opts.alpha == null) ? 1 : opts.alpha;
  const moving = !!opts.moving;
  const walk = opts.phase || 0;
  const idleT = (G.portalAnim || 0) + (opts.bobSeed || 0);
  const atk = Math.max(0, Math.min(1, opts.atk || 0));
  // walking lifts the body and swings the legs apart; idle is a gentle hover bob
  const bob = moving ? -Math.abs(Math.sin(walk*0.3))*2.2 : Math.sin(idleT*1.2)*0.8;
  const legSwing = moving ? Math.sin(walk*0.3)*2.6 : 0;
  const y = py + bob;
  // Shadow (stays on the ground, not affected by bob)
  ctx.globalAlpha = alpha*0.3; ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.ellipse(px, py+14, 10, 4, 0, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = alpha;
  // Legs (animated)
  ctx.fillStyle = darken(color, 0.5);
  ctx.fillRect(px-5 - legSwing, y+4, 4, 10);
  ctx.fillRect(px+1 + legSwing, y+4, 4, 10);
  // Torso
  ctx.fillStyle = color;
  ctx.fillRect(px-6, y-6, 12, 12);
  // Arms (right arm lifts during an attack swing)
  ctx.fillRect(px-9, y-4, 3, 9);
  ctx.fillRect(px+6, y-4 - atk*5, 3, 9);
  // Weapon in hand
  drawSimpleWeapon(px, y, opts.weapon || 'sword', atk);
  // Head
  ctx.fillStyle = '#ddbba0';
  ctx.beginPath(); ctx.arc(px, y-10, 5, 0, Math.PI*2); ctx.fill();
  // Helmet hint
  ctx.fillStyle = darken(color, 0.3);
  ctx.beginPath(); ctx.arc(px, y-10, 5, Math.PI, Math.PI*2); ctx.fill();
  // Class glow
  ctx.globalAlpha = alpha*0.25; ctx.fillStyle = color;
  ctx.beginPath(); ctx.arc(px, y, 18, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = alpha;
  // Attack slash arc
  if (atk > 0) {
    ctx.globalAlpha = alpha*(1-atk)*0.9; ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.arc(px+9, y-2, 14, -1.0 + atk*1.6, 0.3 + atk*1.6); ctx.stroke();
    ctx.globalAlpha = alpha;
  }
  // Name
  ctx.fillStyle = opts.nameColor || '#ffd700'; ctx.font = 'bold 11px MedievalSharp'; ctx.textAlign = 'center';
  ctx.fillText(name, px, y-22);
  // Optional small tag under the name (e.g. "[offline]")
  if (opts.tag) {
    ctx.fillStyle = opts.tagColor || '#8899aa'; ctx.font = '8px MedievalSharp';
    ctx.fillText(opts.tag, px, y-13);
  }
  // Level shown on top, above the name (applies to bot + ghost players too)
  ctx.globalAlpha = alpha;
  ctx.font = 'bold 9px "Press Start 2P", monospace'; ctx.fillStyle = '#ffe680'; ctx.textAlign = 'center';
  ctx.fillText('Lv.' + level, px, y-32);
  ctx.globalAlpha = 1;
}

// Small in-hand weapon sprite for humanoids (does NOT touch globalAlpha so it inherits
// the caller's transparency). The sword swings during an attack.
function drawSimpleWeapon(px, py, type, atk){
  if (type === 'staff') {
    ctx.strokeStyle = '#9b7340'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(px+8, py-12); ctx.lineTo(px+8, py+10); ctx.stroke();
    ctx.fillStyle = '#66ccff';
    ctx.beginPath(); ctx.arc(px+8, py-14, 3.5, 0, Math.PI*2); ctx.fill();
  } else if (type === 'bow') {
    ctx.strokeStyle = '#a0703a'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(px+9, py-1, 11, -Math.PI*0.5, Math.PI*0.5); ctx.stroke();
    ctx.strokeStyle = '#ddd'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(px+9, py-12); ctx.lineTo(px+9, py+10); ctx.stroke();
  } else {
    ctx.save();
    ctx.translate(px+7, py+2);
    ctx.rotate(-(atk||0)*0.9); // swing up while attacking
    ctx.strokeStyle = '#d8d8e8'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(0, 2); ctx.lineTo(7, -16); ctx.stroke();
    ctx.strokeStyle = '#8a6a2a'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(-2, 1); ctx.lineTo(4, -1); ctx.stroke();
    ctx.restore();
  }
}

// Allied companion drawn as a fully-fledged (fake) player: random name on the head,
// class-coloured body, walking + attacking animation.
function drawBot(b, cam){
  const bx = b.x*4-cam.x, by = b.y*4-cam.y;
  const cd = CLASS_DATA[b.cls] || { color:'#33d6c0' };
  const atk = b.atkAnim > 0 ? Math.sin((1 - b.atkAnim/320) * Math.PI) : 0;
  drawHumanoid(bx, by, cd.color, b.name, b.level, {
    alpha: 1,
    moving: b.moving,
    phase: b.walkPhase || 0,
    atk: atk,
    weapon: classWeapon(b.cls),
    nameColor: '#ffd700'
  });
}

// Ghost player: another local character standing on this map. Semi-transparent,
// gentle idle bob, "[offline]" tag, never attackable, no collision, no PVP.
function drawGhost(g, cam){
  const gx = g.px*4-cam.x, gy = g.py*4-cam.y;
  if (gx < -60 || gx > canvas.width+60 || gy < -60 || gy > canvas.height+60) return;
  const cd = CLASS_DATA[g.cls] || { color:'#8899aa' };
  drawHumanoid(gx, gy, cd.color, g.name, g.level, {
    alpha: 0.45,
    moving: false,
    bobSeed: g.bobPhase,
    weapon: classWeapon(g.cls),
    nameColor: '#bcd2ff',
    tag: '[offline]',
    tagColor: '#7d8aa0'
  });
}

// Live ONLINE player from the server presence poll. Drawn at near-full alpha with a green
// "[online]" tag so real players are visually distinct from the semi-transparent offline
// ghosts. Non-interactive (no collision / no PVP), purely cosmetic in the client.
function drawNetPlayer(p, cam){
  const x = p.x*4 - cam.x, y = p.y*4 - cam.y;
  if (x < -60 || x > canvas.width+60 || y < -60 || y > canvas.height+60) return;
  const cd = CLASS_DATA[p.cls] || { color:'#66dd88' };
  drawHumanoid(x, y, cd.color, p.name, p.level || 1, {
    alpha: 0.9,
    moving: false,
    bobSeed: p.bobPhase || 0,
    weapon: classWeapon(p.cls),
    nameColor: '#bfffd0',
    tag: '[online]',
    tagColor: '#3fd06a'
  });
}

// Safe-zone landmark tower with a waving flag
function drawTower(map, cam){
  const s = map.safe;
  const cx = (s.x1 + s.x2) / 2;           // world x centre of safe zone
  const baseY = s.y1 + 6;                  // near the top of the safe zone
  const px = cx*4 - cam.x;
  const groundY = baseY*4 - cam.y;
  const w = 26, h = 70;                    // screen-space tower size
  const topY = groundY - h;
  // body
  const grad = ctx.createLinearGradient(px-w/2, 0, px+w/2, 0);
  grad.addColorStop(0, '#5b5b66'); grad.addColorStop(0.5, '#7a7a86'); grad.addColorStop(1, '#4a4a54');
  ctx.fillStyle = grad; ctx.fillRect(px-w/2, topY, w, h);
  // stone courses
  ctx.strokeStyle = 'rgba(0,0,0,0.25)'; ctx.lineWidth = 1;
  for (let yy = topY+10; yy < groundY; yy += 12) { ctx.beginPath(); ctx.moveTo(px-w/2, yy); ctx.lineTo(px+w/2, yy); ctx.stroke(); }
  // battlements
  ctx.fillStyle = '#6a6a76';
  for (let i=0;i<3;i++){ ctx.fillRect(px-w/2 + i*(w/2.5), topY-7, w/4, 7); }
  // door
  ctx.fillStyle = '#2a2018'; ctx.beginPath(); ctx.moveTo(px-5, groundY); ctx.lineTo(px-5, groundY-9); ctx.arc(px, groundY-9, 5, Math.PI, 0); ctx.lineTo(px+5, groundY); ctx.closePath(); ctx.fill();
  // window
  ctx.fillStyle = '#ffcc66'; ctx.globalAlpha = 0.8; ctx.fillRect(px-3, topY+16, 6, 8); ctx.globalAlpha = 1;
  // flag pole
  ctx.strokeStyle = '#3a2a14'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(px, topY-7); ctx.lineTo(px, topY-26); ctx.stroke();
  // waving flag
  const wave = Math.sin(G.portalAnim*3)*3;
  ctx.fillStyle = '#cc2a2a';
  ctx.beginPath();
  ctx.moveTo(px, topY-26);
  ctx.lineTo(px+16, topY-23 + wave);
  ctx.lineTo(px, topY-18);
  ctx.closePath(); ctx.fill();
}
</script>


<script>
// ===== UTILITY FUNCTIONS =====
function adjColor(hex, amt) { const n=parseInt(hex.replace('#',''),16); let r=(n>>16)&255,g=(n>>8)&255,b=n&255; r=Math.max(0,Math.min(255,Math.floor(r*(1+amt)))); g=Math.max(0,Math.min(255,Math.floor(g*(1+amt)))); b=Math.max(0,Math.min(255,Math.floor(b*(1+amt)))); return `rgb(${r},${g},${b})`; }
function darken(hex, amt) { const n=parseInt(hex.replace('#',''),16); let r=(n>>16)&255,g=(n>>8)&255,b=n&255; r=Math.floor(r*amt); g=Math.floor(g*amt); b=Math.floor(b*amt); return `rgb(${r},${g},${b})`; }
function addDmg(x,y,val,color) { G.dmgNums.push({x,y,val,color,life:60,dy:0}); }

// ===== UI FUNCTIONS =====
function updateUI() {
  const c = G.char, needed = expForLevel(c.level);
  document.getElementById('ui-charname').textContent = c.name;
  document.getElementById('ui-level').textContent = 'Lv.'+c.level;
  document.getElementById('ui-class').textContent = CLASS_DATA[c.cls].name;
  document.getElementById('ui-map').textContent = '⚔ '+G.map.name;
  document.getElementById('ui-zen').textContent = '💰 '+c.zen.toLocaleString()+' Zen';
  // Portrait color
  document.getElementById('topbar-portrait').style.background = CLASS_DATA[c.cls].color;
  // Bars (use effective max including equipment Life/Mana bonuses)
  const mhp = effMaxHp(), mmp = effMaxMp();
  if (c.hp > mhp) c.hp = mhp;
  if (c.mp > mmp) c.mp = mmp;
  const hpPct = c.hp/mhp*100;
  document.getElementById('hp-bar').style.width = hpPct+'%';
  document.getElementById('hp-text').textContent = c.hp+'/'+mhp;
  document.getElementById('hp-bar').classList.toggle('hp-low', hpPct < 30);
  document.getElementById('mp-bar').style.width = (c.mp/mmp*100)+'%';
  document.getElementById('mp-text').textContent = c.mp+'/'+mmp;
  document.getElementById('exp-bar').style.width = (c.exp/needed*100)+'%';
  document.getElementById('exp-text').textContent = c.exp+'/'+needed;
}

function gameLog(msg, type) {
  const el = document.getElementById('log-messages');
  const colors = {combat:'#ff8888',system:'#88ff88',loot:'#ffcc44',info:'#88ccff'};
  const d = document.createElement('div');
  d.className = 'log-entry';
  const now = new Date();
  const time = now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
  d.innerHTML = `<span class="log-time">${time}</span><span style="color:${colors[type]||'#ccc'}">${msg}</span>`;
  el.appendChild(d);
  el.parentElement.scrollTop = el.parentElement.scrollHeight;
  while (el.children.length > 50) el.removeChild(el.firstChild);
}

function doRest() {
  const c = G.char;
  const mhp = effMaxHp(), mmp = effMaxMp();
  c.hp = Math.min(mhp, c.hp + Math.floor(mhp*0.15));
  c.mp = Math.min(mmp, c.mp + Math.floor(mmp*0.15));
  gameLog('Resting... recovered HP/MP','system');
  updateUI(); saveGame();
}

function saveGame() {
  const chars = getChars();
  const idx = chars.findIndex(x => x.id === G.char.id);
  if (idx >= 0) chars[idx] = G.char;
  saveChars(chars);
  saveInv(G.char.id, G.inv);
  // ONLINE: push this character to the server, throttled to ~once per 5s, fire-and-forget.
  if (NET.online && NET.token) {
    const now = Date.now();
    if (now - NET.lastSync > 5000) {
      NET.lastSync = now;
      NET.post('/api/sync', { token: NET.token, character: G.char }).catch(() => {});
    }
  }
}
function saveAndQuit() { saveGame(); stopNetSync(); G.netPlayers = []; G.running = false; loadCharSelect(); }
</script>


<script>
// ===== PANELS (Inventory, Stats, Shop) =====
let currentPanel = null;

function togglePanel(type) {
  const panel = document.getElementById('panel-right');
  if (currentPanel === type) { panel.classList.add('hidden'); currentPanel = null; return; }
  currentPanel = type;
  panel.classList.remove('hidden');
  if (type === 'inv') renderInventory();
  else if (type === 'stats') renderStats();
  else if (type === 'travel') renderTravel();
}

function getItemRarity(item) {
  if (item.price >= 5000) return 'epic';
  if (item.price >= 2000) return 'rare';
  if (item.price >= 800) return 'uncommon';
  return 'common';
}

// One-line description of an item instance including rolled bonuses
function itemStatsLine(inst){
  const it = ITEMS[inst.itemId]; if (!it) return '';
  const parts = [];
  const plusBonus = Math.round((inst.plus||0)*1.5);
  const addOpt = inst.addOpt||0;
  if (it.slot === 'weapon') {
    const atk = (it.attack||0) + (it.magic||0) + plusBonus + addOpt;
    parts.push('Atk '+atk);
  } else if (['armor','shield','helmet','boots'].includes(it.slot)) {
    parts.push('Def '+((it.defense||0)+plusBonus+addOpt));
  } else if (it.desc) {
    parts.push(it.desc);
  }
  if (inst.luck) parts.push('Luck +5% crit');
  if (inst.exc && inst.exc.length) parts.push(inst.exc.join(', '));
  return parts.join(' · ');
}

// Base attribute line for an item DEFINITION (used by the shop, which shows raw items).
function itemBaseStatsLine(itemId){
  const it = ITEMS[itemId]; if (!it) return '';
  const parts = [];
  if (it.slot === 'weapon'){
    const atk = (it.attack||0) + (it.magic||0);
    parts.push('Atk '+atk);
    if (it.magic) parts.push('Magic '+it.magic);
  } else if (['armor','shield','helmet','boots'].includes(it.slot)){
    parts.push('Def '+(it.defense||0));
  }
  if (it.healHp) parts.push('Heals '+it.healHp+' HP');
  if (it.healMp) parts.push('Heals '+it.healMp+' MP');
  return parts.join(' · ');
}

// Requirement line for an item. Each requirement is coloured RED when `char` does NOT
// meet it, otherwise a muted green. Returns '' when the item has no requirements.
// Null-safe: with no char (or no reqs) everything renders as satisfied.
function itemReqHtml(itemId, char){
  const it = ITEMS[itemId]; if (!it) return '';
  const okCol = '#7a8a6a', badCol = '#ff5555';
  const reqs = [];
  if (it.reqClass && it.reqClass.length){
    const names = it.reqClass.map(k => (CLASS_DATA[k]||{}).name || k).join(' / ');
    const ok = !char || it.reqClass.includes(char.cls);
    reqs.push(`<span style="color:${ok?okCol:badCol};">Class: ${names}</span>`);
  }
  if (it.reqLevel){
    const ok = !char || (char.level||1) >= it.reqLevel;
    reqs.push(`<span style="color:${ok?okCol:badCol};">Lv.${it.reqLevel}</span>`);
  }
  [['reqStr','str','STR'],['reqAgi','agi','AGI'],['reqEne','ene','ENE'],['reqVit','vit','VIT']].forEach(([rk,ck,lbl]) => {
    if (it[rk]){
      const ok = !char || (char[ck]||0) >= it[rk];
      reqs.push(`<span style="color:${ok?okCol:badCol};">${it[rk]} ${lbl}</span>`);
    }
  });
  if (!reqs.length) return '';
  return `<br><small style="color:#6b5b3a;">Req: ${reqs.join(' · ')}</small>`;
}

function renderInventory() {
  const equipped = G.inv.filter(i => i.equipped);
  const bag = G.inv.filter(i => !i.equipped);
  let html = `<div class="panel-title">Inventory <button onclick="document.getElementById('panel-right').classList.add('hidden');currentPanel=null;" style="float:right;background:none;border:none;color:#6b5b3a;cursor:pointer;font-size:18px;">✕</button></div>`;
  html += '<div style="color:#8b7355;font-size:12px;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px;">Equipped</div>';
  if (!equipped.length) html += '<div style="color:#4a4030;font-size:12px;font-style:italic;">Nothing equipped</div>';
  equipped.forEach(i => { const it = ITEMS[i.itemId]; if (!it) return; const r = getItemRarity(it);
    html += `<div class="item-card equipped rarity-${r}">${itemIconHtml(i.itemId)}<span style="flex:1;"><span style="color:${itemColor(i)};font-weight:bold;">${itemDisplayName(i)}</span> <small style="color:#6b5b3a;">(${it.slot||''})</small><br><small style="color:#7a8a6a;">${itemStatsLine(i)}</small>${itemReqHtml(i.itemId, G.char)}</span><button class="item-btn" onclick="unequipItem('${i.uid}')">Unequip</button></div>`;
  });
  html += '<div style="color:#8b7355;font-size:12px;margin:12px 0 8px;text-transform:uppercase;letter-spacing:1px;">Bag</div>';
  if (!bag.length) html += '<div style="color:#4a4030;font-size:12px;font-style:italic;">Empty</div>';
  bag.forEach(i => { const it = ITEMS[i.itemId]; if (!it) return; const r = getItemRarity(it); let btns = '';
    if (it.slot) btns += `<button class="item-btn" onclick="equipItem('${i.uid}')">Equip</button>`;
    if (it.type==='consumable') btns += `<button class="item-btn use" onclick="useItem('${i.uid}')">Use</button>`;
    btns += `<button class="item-btn sell" onclick="sellItem('${i.uid}')">Sell</button>`;
    html += `<div class="item-card rarity-${r}">${itemIconHtml(i.itemId)}<span style="flex:1;"><span style="color:${itemColor(i)};font-weight:bold;">${itemDisplayName(i)}</span><br><small style="color:#6b5b3a;">${itemStatsLine(i)||it.desc||''}</small>${itemReqHtml(i.itemId, G.char)}</span><div style="display:flex;gap:4px;">${btns}</div></div>`;
  });
  document.getElementById('panel-right').innerHTML = html;
}

function renderStats() {
  const c = G.char, needed = expForLevel(c.level), canAdd = c.statPts > 0;
  const st = G.stats || (G.stats = computeStats(c, G.inv));
  // Per-attribute allocation controls: +1, +10, Max, and a free-number box + Add.
  const ctrls = (stat) => !canAdd ? '' : `
    <div class="stat-alloc">
      <button class="stat-add-btn" onclick="addStat('${stat}',1)">+1</button>
      <button class="stat-add-btn" onclick="addStat('${stat}',10)">+10</button>
      <button class="stat-add-btn" onclick="addStat('${stat}','max')">Max</button>
      <input id="statamt-${stat}" class="stat-amt" type="number" min="1" value="1">
      <button class="stat-add-btn" onclick="addStatInput('${stat}')">Add</button>
    </div>`;
  const attr = (label, stat, val) => `
    <div class="stat-row"><span class="stat-label">${label}</span><span class="stat-value">${val}</span></div>
    ${ctrls(stat)}`;
  document.getElementById('panel-right').innerHTML = `
    <div class="panel-title">Character Stats <button onclick="document.getElementById('panel-right').classList.add('hidden');currentPanel=null;" style="float:right;background:none;border:none;color:#6b5b3a;cursor:pointer;font-size:18px;">✕</button></div>
    <div style="color:#ffd700;text-align:center;margin:8px 0 14px;font-size:13px;background:rgba(255,215,0,0.05);padding:6px;border-radius:4px;border:1px solid rgba(255,215,0,0.15);">Available Points: <strong>${c.statPts}</strong></div>
    <div class="stat-row"><span class="stat-label">Level</span><span class="stat-value">${c.level}</span></div>
    <div class="stat-row"><span class="stat-label">EXP</span><span class="stat-value">${c.exp}/${needed}</span></div>
    <div class="stat-row"><span class="stat-label">Class</span><span class="stat-value" style="color:${CLASS_DATA[c.cls].color};">${CLASS_DATA[c.cls].name}</span></div>
    <div style="height:1px;background:rgba(139,105,20,0.2);margin:10px 0;"></div>
    <div style="color:#ffd700;font-size:12px;margin:4px 0 6px;text-transform:uppercase;letter-spacing:1px;">Combat</div>
    <div class="stat-row"><span class="stat-label">Damage</span><span class="stat-value" style="color:#ffcc66;">${st.dmgMin} - ${st.dmgMax}</span></div>
    <div class="stat-row"><span class="stat-label">Defense</span><span class="stat-value" style="color:#88ccff;">${st.defense}</span></div>
    <div class="stat-row"><span class="stat-label">Crit Chance</span><span class="stat-value" style="color:#ff9933;">${st.crit.toFixed(1)}%</span></div>
    <div class="stat-row"><span class="stat-label">Atk Speed</span><span class="stat-value">${st.atkSpeed}</span></div>
    <div style="height:1px;background:rgba(139,105,20,0.2);margin:10px 0;"></div>
    ${canAdd ? '<div style="color:#8b7355;font-size:11px;margin-bottom:6px;font-style:italic;">Allocate points: +1 / +10 / Max, or type an amount and press Add.</div>' : ''}
    ${attr('Strength','str',c.str)}
    ${attr('Agility','agi',c.agi)}
    ${attr('Vitality','vit',c.vit)}
    ${attr('Energy','ene',c.ene)}
    <div style="height:1px;background:rgba(139,105,20,0.2);margin:10px 0;"></div>
    <div class="stat-row"><span class="stat-label">HP</span><span class="stat-value" style="color:#ff6666;">${c.hp}/${effMaxHp()}</span></div>
    <div class="stat-row"><span class="stat-label">MP</span><span class="stat-value" style="color:#6688ff;">${c.mp}/${effMaxMp()}</span></div>
    <div class="stat-row"><span class="stat-label">Zen</span><span class="stat-value" style="color:#ffcc00;">${c.zen.toLocaleString()}</span></div>
  `;
}

// ===== TRAVEL MENU =====
const MAP_ORDER = ['lorencia','noria','elbeland','devias','dungeon','kalima','atlans','lost_tower','aida','tarkan','icarus','valley_of_loren'];
function renderTravel() {
  const c = G.char;
  let html = `<div class="panel-title">Travel <button onclick="document.getElementById('panel-right').classList.add('hidden');currentPanel=null;" style="float:right;background:none;border:none;color:#6b5b3a;cursor:pointer;font-size:18px;">✕</button></div>`;
  html += '<div style="color:#8b7355;font-size:12px;margin-bottom:8px;">Select a destination</div>';
  MAP_ORDER.forEach(mid => {
    const map = MAPS[mid]; if (!map) return;
    const locked = c.level < map.reqLevel;
    const here = c.mapId === mid;
    const req = map.reqLevel > 0 ? `Lv.${map.reqLevel}` : 'No requirement';
    if (locked) {
      html += `<div class="item-card" style="opacity:0.5;cursor:not-allowed;"><span style="flex:1;color:#888;">🔒 ${map.name}<br><small style="color:#aa6666;">Requires Level ${map.reqLevel}</small></span></div>`;
    } else {
      html += `<div class="item-card${here?' equipped':''}"><span style="flex:1;"><span style="color:${here?'#88ff88':'#ffd700'};font-weight:bold;">${map.name}${here?' (here)':''}</span><br><small style="color:#6b5b3a;">${req}</small></span>${here?'':`<button class="item-btn" onclick="travelTo('${mid}')" style="border-color:#8b6914;color:#ffd700;">Go</button>`}</div>`;
    }
  });
  document.getElementById('panel-right').innerHTML = html;
}
function travelTo(mapId) {
  const map = MAPS[mapId];
  if (!map) return;
  if (G.char.level < map.reqLevel) { gameLog('You need to be level '+map.reqLevel+' to enter '+map.name+'.','info'); return; }
  const s = map.safe;
  G.char.mapId = mapId;
  G.char.px = s ? (s.x1+s.x2)/2 : 128;
  G.char.py = s ? (s.y1+s.y2)/2 : 128;
  loadMap(mapId);
  gameLog('Traveled to '+map.name+'!','system');
  updateUI(); saveGame();
  if (currentPanel === 'travel') renderTravel();
}

// Allocate stat points. `amount` may be a number (default 1) or the string 'max' to
// dump every remaining point into the stat. Clamps to available points, recomputes
// HP/MP from the class formulas, then refreshes everything and saves.
function addStat(stat, amount) {
  const c = G.char;
  if (c.statPts <= 0) return;
  let amt = (amount === 'max') ? c.statPts : Math.floor(Number(amount));
  if (!isFinite(amt) || amt < 1) amt = 1;
  amt = Math.min(amt, c.statPts);
  if (amt <= 0) return;
  c[stat] += amt;
  c.statPts -= amt;
  const cd = CLASS_DATA[c.cls];
  if (stat === 'vit') c.maxHp = cd.baseHp + (c.vit - cd.baseVit) * cd.hpPerVit;
  if (stat === 'ene') c.maxMp = cd.baseMp + (c.ene - cd.baseEne) * cd.mpPerEne;
  recompute();
  gameLog(`+${amt} ${stat.toUpperCase()}!`,'system');
  renderStats(); updateUI(); saveGame();
}
// Read the per-stat number box and allocate that many points at once.
function addStatInput(stat) {
  const el = document.getElementById('statamt-'+stat);
  const n = el ? parseInt(el.value, 10) : 1;
  addStat(stat, isNaN(n) ? 1 : n);
}

function equipItem(uid) {
  const item = G.inv.find(i=>i.uid===uid);
  if (!item) return;
  const it = ITEMS[item.itemId];
  if (!it || !it.slot) return;
  const c = G.char;
  // ---- requirement checks: class, level, then primary stat ----
  if (it.reqClass && it.reqClass.length && !it.reqClass.includes(c.cls)){
    const names = it.reqClass.map(k => (CLASS_DATA[k]||{}).name || k).join(' / ');
    gameLog(`Cannot equip ${it.name}: requires ${names}`, 'combat');
    return;
  }
  if (it.reqLevel && (c.level||1) < it.reqLevel){
    gameLog(`Cannot equip ${it.name}: requires Level ${it.reqLevel}`, 'combat');
    return;
  }
  const statChecks = [['reqStr','str','STR'],['reqAgi','agi','AGI'],['reqEne','ene','ENE'],['reqVit','vit','VIT']];
  for (const [rk, ck, lbl] of statChecks){
    if (it[rk] && (c[ck]||0) < it[rk]){
      gameLog(`Cannot equip ${it.name}: requires ${it[rk]} ${lbl}`, 'combat');
      return;
    }
  }
  G.inv.forEach(i => { if (i.equipped && ITEMS[i.itemId] && ITEMS[i.itemId].slot === it.slot) i.equipped = 0; });
  item.equipped = 1;
  recompute();
  gameLog(`Equipped ${itemDisplayName(item)}`,'system');
  renderInventory(); updateUI(); saveGame();
}
function unequipItem(uid) {
  const item = G.inv.find(i=>i.uid===uid);
  if (item) item.equipped = 0;
  recompute();
  renderInventory(); updateUI(); saveGame();
}
function useItem(uid) {
  const idx = G.inv.findIndex(i=>i.uid===uid);
  if (idx < 0) return;
  const it = ITEMS[G.inv[idx].itemId];
  if (it.healHp) G.char.hp = Math.min(effMaxHp(), G.char.hp + it.healHp);
  if (it.healMp) G.char.mp = Math.min(effMaxMp(), G.char.mp + it.healMp);
  G.inv.splice(idx, 1);
  gameLog(`Used ${it.name}`,'system');
  renderInventory(); updateUI(); saveGame();
}
function sellItem(uid) {
  const idx = G.inv.findIndex(i=>i.uid===uid);
  if (idx < 0) return;
  const inst = G.inv[idx];
  const it = ITEMS[inst.itemId];
  let price = Math.floor((it.price||100)/2);
  price += (inst.plus||0)*50 + ((inst.exc&&inst.exc.length)||0)*250 + (inst.luck?120:0) + (inst.addOpt||0)*4;
  G.char.zen += price;
  G.inv.splice(idx, 1);
  gameLog(`Sold ${itemDisplayName(inst)} for ${price} Zen`,'loot');
  renderInventory(); updateUI(); saveGame();
}
</script>


<script>
// ===== ADMIN PANEL =====
function openAdminPanel(){
  if (!isGM()) { alert('Admins and GMs only.'); return; }
  renderAdminPanel();
  document.getElementById('admin-modal').classList.remove('hidden');
}
function closeAdminPanel(){ document.getElementById('admin-modal').classList.add('hidden'); }

// Re-render the admin panel plus the character-select list/buttons after any change.
function adminRefresh(){ renderAdminPanel(); renderCharacterList(); renderCharselActions(); }

function renderAdminPanel(){
  const accounts = getAccounts();
  const chars = getChars();
  const escAttr = s => String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  let html = `<div class="admin-itemids"><b style="color:#8b7355;">Valid item IDs:</b> ${Object.keys(ITEMS).join(', ')}</div>`;
  html += `<div class="admin-note">You are signed in as <b style="color:#ffd700;">${currentUser}</b> (${(currentAccount()||{}).role||'?'}). Admins manage everyone; GMs manage players only.</div>`;
  if (!accounts.length) { html += '<p style="color:#6b5b3a;">No accounts found.</p>'; }
  accounts.forEach(a => {
    const role = a.role || 'player';
    const banned = !!a.banned;
    const manage = canManageAccount(a);
    const u = escAttr(a.username);
    const cls = 'admin-acct' + (role==='admin'?' is-admin':role==='gm'?' is-gm':'') + (banned?' is-banned':'');
    const roleOpts = ['player','gm','admin'].map(r => {
      if (r === 'admin' && !isAdmin()) return ''; // only admins may assign the admin role
      return `<option value="${r}"${r===role?' selected':''}>${r}</option>`;
    }).join('');
    html += `<div class="${cls}">
      <div class="admin-acct-head">
        <span class="admin-uname">${a.username}</span>
        <span class="role-badge role-${role}">${role}</span>
        ${banned?'<span class="ban-badge">BANNED</span>':''}
        ${a.username===currentUser?'<span style="color:#88ff88;font-size:11px;">(you)</span>':''}
        <span style="flex:1;"></span>`;
    if (manage) {
      html += `<label style="font-size:11px;color:#8b7355;">Role
          <select class="admin-select" onchange="adminSetRole('${u}', this.value)">${roleOpts}</select></label>
        <button class="item-btn" onclick="adminToggleBan('${u}')">${banned?'Unban':'Ban'}</button>
        <button class="item-btn sell" onclick="adminDeleteAccount('${u}')">Delete</button>`;
    } else {
      html += `<span style="font-size:11px;color:#6b5b3a;">No permission</span>`;
    }
    html += `</div>`;
    const owned = chars.filter(c => c.owner === a.username);
    if (owned.length) {
      owned.forEach(c => {
        const cd = CLASS_DATA[c.cls] || { name:c.cls, color:'#ccc' };
        html += `<div class="admin-char">
          <span style="color:${cd.color};font-weight:bold;">${c.name}</span>
          <span style="color:#8b7355;">${cd.name}</span>
          <span style="color:#88ccff;">Lv.${c.level}</span>
          <span style="color:#ffcc00;">${(c.zen||0).toLocaleString()} Zen</span>
          <span style="flex:1;"></span>`;
        if (manage) {
          html += `<button class="item-btn" onclick="adminSetCharLevel('${c.id}')">Set Level</button>
            <button class="item-btn" onclick="adminGrantZen('${c.id}')">Grant Zen</button>
            <button class="item-btn" onclick="adminGrantItem('${c.id}')">Grant Item</button>`;
        }
        html += `</div>`;
      });
    } else {
      html += `<div class="admin-char" style="color:#4a4030;font-style:italic;">No characters</div>`;
    }
    html += `</div>`;
  });
  document.getElementById('admin-content').innerHTML = html;
}

function adminSetRole(username, role){
  const accounts = getAccounts();
  const t = accounts.find(a => a.username === username);
  if (!t) return;
  if (!canManageAccount(t)) { alert('You do not have permission to manage this account.'); return; }
  if (role === 'admin' && !isAdmin()) { alert('Only admins can grant the admin role.'); renderAdminPanel(); return; }
  if (t.role === 'admin' && !isAdmin()) { alert("Only admins can change an admin's role."); renderAdminPanel(); return; }
  t.role = role;
  if (role === 'admin') t.banned = false;
  saveAccounts(accounts);
  adminRefresh();
}

function adminToggleBan(username){
  const accounts = getAccounts();
  const t = accounts.find(a => a.username === username);
  if (!t) return;
  if (!canManageAccount(t)) { alert('No permission.'); return; }
  if (t.role === 'admin' && !isAdmin()) { alert('Only admins can ban an admin account.'); return; }
  if (username === currentUser && !t.banned) { alert('You cannot ban your own account.'); return; }
  t.banned = !t.banned;
  saveAccounts(accounts);
  adminRefresh();
}

function adminDeleteAccount(username){
  const accounts = getAccounts();
  const t = accounts.find(a => a.username === username);
  if (!t) return;
  if (!canManageAccount(t)) { alert('No permission.'); return; }
  if (t.role === 'admin' && !isAdmin()) { alert('Only admins can delete an admin account.'); return; }
  if (username === currentUser) { alert('You cannot delete your own account.'); return; }
  if (!confirm('Delete account "'+username+'" and ALL of its characters? This cannot be undone.')) return;
  // Remove the account, its characters, and each character's inventory.
  const chars = getChars();
  chars.filter(c => c.owner === username).forEach(c => Store.del('inv_'+c.id));
  saveChars(chars.filter(c => c.owner !== username));
  saveAccounts(accounts.filter(a => a.username !== username));
  adminRefresh();
}

// Locate a stored character + permission-check its owner before granting.
function adminFindManageableChar(charId){
  const chars = getChars();
  const ch = chars.find(c => c.id === charId);
  if (!ch) return null;
  const owner = getAccountByName(ch.owner);
  if (!canManageAccount(owner)) { alert('No permission to modify this account.'); return null; }
  return { chars, ch };
}

function adminSetCharLevel(charId){
  const found = adminFindManageableChar(charId); if (!found) return;
  const { chars, ch } = found;
  const raw = prompt('Set level for '+ch.name+' (1-400):', ch.level);
  if (raw === null) return;
  let lvl = parseInt(raw, 10);
  if (isNaN(lvl)) { alert('Please enter a valid number.'); return; }
  lvl = Math.max(1, Math.min(400, lvl));
  const cd = CLASS_DATA[ch.cls] || {};
  const old = ch.level;
  ch.level = lvl;
  // Recompute max HP/MP from the class formula (base + per-level + attribute bonuses).
  ch.maxHp = Math.round((cd.baseHp||100) + (cd.hpPerLevel||0)*(lvl-1) + ((ch.vit||0)-(cd.baseVit||0))*(cd.hpPerVit||0));
  ch.maxMp = Math.round((cd.baseMp||0)  + (cd.mpPerLevel||0)*(lvl-1) + ((ch.ene||0)-(cd.baseEne||0))*(cd.mpPerEne||0));
  ch.maxHp = Math.max(1, ch.maxHp); ch.maxMp = Math.max(0, ch.maxMp);
  ch.hp = ch.maxHp; ch.mp = ch.maxMp;
  if (lvl > old) ch.statPts = (ch.statPts||0) + (lvl - old)*5;
  ch.exp = 0;
  saveChars(chars);
  adminRefresh();
}

function adminGrantZen(charId){
  const found = adminFindManageableChar(charId); if (!found) return;
  const { chars, ch } = found;
  const raw = prompt('Grant Zen to '+ch.name+' (use a negative number to remove):', '100000');
  if (raw === null) return;
  const amt = parseInt(raw, 10);
  if (isNaN(amt)) { alert('Please enter a valid number.'); return; }
  ch.zen = Math.max(0, (ch.zen||0) + amt);
  saveChars(chars);
  adminRefresh();
}

function adminGrantItem(charId){
  const found = adminFindManageableChar(charId); if (!found) return;
  const { ch } = found;
  // Show a searchable item picker modal instead of prompt()
  let items = Object.keys(ITEMS);
  let modal = document.createElement('div');
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.8);display:flex;z-index:9999;';
  modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
  let inner = `<div style="margin:auto;background:#14142a;border:1px solid #ffd700;border-radius:10px;padding:16px;width:90vw;max-width:420px;max-height:80vh;display:flex;flex-direction:column;">`;
  inner += `<h3 style="color:#ffd700;margin-bottom:8px;">Give Item to ${ch.name}</h3>`;
  inner += `<input type="text" id="admin-grant-search" placeholder="Search items..." oninput="adminFilterGrantItems()" style="width:100%;padding:8px;background:#111;border:1px solid #444;color:#fff;border-radius:4px;font-size:13px;margin-bottom:6px;">`;
  inner += `<div id="admin-grant-list" style="flex:1;overflow-y:auto;border:1px solid #333;border-radius:4px;background:#0e0e1e;">`;
  items.forEach(id => {
    const it = ITEMS[id];
    inner += `<div class="admin-grant-row" data-name="${it.name.toLowerCase()}" onclick="adminDoGrantItem('${charId}','${id}')" style="display:flex;align-items:center;gap:6px;padding:6px 10px;border-bottom:1px solid #1a1a2e;cursor:pointer;font-size:12px;" onmouseover="this.style.background='#1a2a3a'" onmouseout="this.style.background=''">`;
    if (it.img) inner += `<img src="${it.img}" style="width:24px;height:24px;object-fit:contain;image-rendering:pixelated;" onerror="this.style.display='none'">`;
    inner += `<span style="flex:1;color:#ddd;">${it.name}</span><small style="color:#888;">${it.type}${it.slot?' / '+it.slot:''}</small></div>`;
  });
  inner += `</div><button onclick="this.closest('div[style*=fixed]').remove()" style="margin-top:8px;padding:8px;background:#16213e;border:1px solid #ffd700;color:#ffd700;border-radius:4px;cursor:pointer;">Cancel</button></div>`;
  modal.innerHTML = inner;
  document.body.appendChild(modal);
  setTimeout(() => { const s = document.getElementById('admin-grant-search'); if (s) s.focus(); }, 100);
}
function adminFilterGrantItems() {
  const q = (document.getElementById('admin-grant-search') || {}).value || '';
  const rows = document.querySelectorAll('.admin-grant-row');
  rows.forEach(el => { el.style.display = (!q || el.dataset.name.includes(q.toLowerCase())) ? 'flex' : 'none'; });
}
function adminDoGrantItem(charId, itemId) {
  const inv = getInv(charId);
  inv.push(makeInstance(itemId));
  saveInv(charId, inv);
  if (G.char && G.char.id === charId) { G.inv = inv; recompute(); }
  gameLog('Admin: Gave ' + ITEMS[itemId].name + ' to character.', 'system');
  // Close the modal
  const m = document.querySelector('div[style*="z-index:9999"]'); if (m) m.remove();
  adminRefresh();
}

// ===== GLOBAL RANKING / LEADERBOARD =====
async function openRanking(){
  await renderRanking();
  document.getElementById('ranking-modal').classList.remove('hidden');
}
function closeRanking(){ document.getElementById('ranking-modal').classList.add('hidden'); }

async function renderRanking(){
  // ONLINE: pull the global leaderboard from the server. OFFLINE: rank local characters.
  let top = null;
  if (NET.online) {
    try {
      const res = await NET.get('/api/ranking');
      if (res.ok && res.data && Array.isArray(res.data.ranking)) top = res.data.ranking;
    } catch (e) { /* fall back to local */ }
  }
  if (!top) {
    // Gather ALL characters across every account, rank by level then exp.
    top = getChars().slice().sort((a,b) => (b.level - a.level) || ((b.exp||0) - (a.exp||0))).slice(0, 50);
  }
  let rows;
  if (!top.length) {
    rows = '<tr><td colspan="6" style="color:#6b5b3a;">No characters have been created yet.</td></tr>';
  } else {
    rows = top.map((c, i) => {
      const cd = CLASS_DATA[c.cls] || { name:c.cls, color:'#ccc' };
      const rankCell = i===0 ? '🥇' : i===1 ? '🥈' : i===2 ? '🥉' : ('#' + (i+1));
      const mapName = (MAPS[c.mapId] && MAPS[c.mapId].name) || c.mapId || '—';
      const mine = c.owner === currentUser;
      const rowCls = (i < 3 ? 'rank-top' : '') + (mine ? ' rank-me' : '');
      return `<tr class="${rowCls.trim()}">
        <td>${rankCell}</td>
        <td style="color:#ffd700;font-weight:bold;">${c.name}</td>
        <td style="color:#8b7355;">${c.owner}</td>
        <td style="color:${cd.color};">${cd.name}</td>
        <td style="color:#88ccff;">${c.level}</td>
        <td style="color:#88ff88;">${mapName}</td>
      </tr>`;
    }).join('');
  }
  document.getElementById('ranking-content').innerHTML =
    `<table class="rank-table"><thead><tr>
      <th>Rank</th><th>Character</th><th>Owner</th><th>Class</th><th>Lv</th><th>Map</th>
    </tr></thead><tbody>${rows}</tbody></table>`;
}
</script>


<script>
// ===== SHOP =====
function openShop(shopId, npcName) {
  const items = SHOPS[shopId];
  if (!items) { gameLog('Nothing to offer.','info'); return; }
  currentPanel = 'shop';
  const panel = document.getElementById('panel-right');
  panel.classList.remove('hidden');
  let html = `<div class="panel-title">${npcName || 'Shop'} <button onclick="document.getElementById('panel-right').classList.add('hidden');currentPanel=null;" style="float:right;background:none;border:none;color:#6b5b3a;cursor:pointer;font-size:18px;">✕</button></div>`;
  items.forEach(itemId => { const it = ITEMS[itemId]; const r = getItemRarity(it);
    const stats = itemBaseStatsLine(itemId);
    html += `<div class="item-card rarity-${r}">
      ${itemIconHtml(itemId)}<span style="flex:1;">${it.name}<br>${stats?`<small style="color:#7a8a6a;">${stats}</small><br>`:''}<small style="color:#6b5b3a;">${it.desc||''}</small>${itemReqHtml(itemId, G.char)}<br><small style="color:#ffcc00;">💰 ${it.price} Zen</small></span>
      <button class="item-btn" onclick="buyItem('${itemId}')" style="border-color:#8b6914;color:#ffd700;">Buy</button>
    </div>`;
  });
  panel.innerHTML = html;
}

function buyItem(itemId) {
  const it = ITEMS[itemId];
  if (G.char.zen < it.price) { gameLog('Not enough Zen!','info'); return; }
  G.char.zen -= it.price;
  const uid = Date.now().toString(36)+Math.random().toString(36).slice(2,6);
  G.inv.push({uid, itemId, equipped:0});
  gameLog(`Bought ${it.name}!`,'loot');
  updateUI(); saveGame();
  openShop(Object.keys(SHOPS).find(k => SHOPS[k].includes(itemId)), '');
}

// ===== INIT =====
(function() {
  // Kick off online-mode detection (fire-and-forget). On file:// or with no server this
  // resolves to NET.online=false and the game runs in pure localStorage offline mode.
  NET.init();
  migrateAccounts();
  let session = Store.get('session');
  // Don't auto-resume a session for a deleted or banned account.
  if (session) {
    const acc = getAccountByName(session);
    if (!acc || acc.banned) { Store.del('session'); session = null; }
  }
  if (session) { currentUser = session; loadCharSelect(); initCharselParticles(); }
  else { initAuthParticles(); }
  window.addEventListener('resize', () => {
    if (authCanvas) { authCanvas.width = window.innerWidth; authCanvas.height = window.innerHeight; }
    if (charselCanvas) { charselCanvas.width = window.innerWidth; charselCanvas.height = window.innerHeight; }
  });
})();

// Override showScreen to init particles
const _origShowScreen = showScreen;
showScreen = function(id) {
