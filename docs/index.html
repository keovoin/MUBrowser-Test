<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a0a">
<title>MU Online - Browser Edition</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: #0a0a0a; color: #e0e0e0; overflow: hidden; width: 100vw; height: 100vh; height: 100dvh; touch-action: none; overscroll-behavior: none; -webkit-tap-highlight-color: transparent; -webkit-user-select: none; user-select: none; }
#game-canvas { display: block; touch-action: none; }
.screen { display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
.screen.active { display: flex; }
.hidden { display: none !important; }
.auth-container { margin: auto; text-align: center; background: rgba(20,20,40,0.95); padding: 40px; border-radius: 12px; border: 1px solid #333; min-width: 360px; }
.game-title { font-size: 48px; color: #ffd700; text-shadow: 0 0 20px rgba(255,215,0,0.5); letter-spacing: 4px; }
.game-subtitle { color: #888; margin-bottom: 30px; }
.tabs { display: flex; gap: 0; margin-bottom: 20px; }
.tab { flex: 1; padding: 10px; background: #1a1a2e; border: 1px solid #333; cursor: pointer; color: #aaa; transition: 0.2s; }
.tab.active { background: #16213e; color: #ffd700; border-color: #ffd700; }
.auth-form { display: flex; flex-direction: column; gap: 12px; }
.auth-form input { padding: 12px; background: #1a1a2e; border: 1px solid #333; color: #fff; border-radius: 4px; font-size: 14px; }
.auth-form input:focus { border-color: #ffd700; outline: none; }
.btn-primary { padding: 12px; background: linear-gradient(135deg,#ffd700,#ff8c00); border: none; color: #000; font-weight: bold; font-size: 16px; cursor: pointer; border-radius: 4px; }
.btn-primary:hover { transform: scale(1.02); }
.btn-secondary { padding: 10px 20px; background: #16213e; border: 1px solid #ffd700; color: #ffd700; cursor: pointer; border-radius: 4px; margin: 10px; }
.btn-link { background: none; border: none; color: #888; cursor: pointer; margin: 10px; text-decoration: underline; }
.error-msg { color: #ff4444; font-size: 13px; margin-top: 8px; min-height: 18px; }
/* ===== Mobile / responsive ===== */
@media (max-width: 700px), (pointer: coarse) {
  .game-title { font-size: 36px; letter-spacing: 2px; }
  .auth-container { min-width: 0 !important; width: 92vw !important; max-width: 460px; padding: 22px !important; }
  #screen-charselect .auth-container { min-width: 0 !important; width: 94vw !important; }
  #create-modal > div { min-width: 0 !important; width: 92vw !important; max-width: 460px; }
  /* HP/MP/EXP bars shrink to fit narrow screens */
  #ui-bars { gap: 4px; width: 96vw; justify-content: center; bottom: 6px; }
  #ui-bars > div { width: 30vw !important; min-width: 0 !important; }
  /* Bigger, thumb-friendly action buttons */
  #ui-actions { bottom: 64px; right: 8px; gap: 8px; }
  #ui-actions button { width: 50px !important; height: 50px !important; font-size: 22px !important; }
  /* Right-side panels become near-full-width sheets */
  #panel-right { width: 94vw !important; max-width: 380px; right: 3vw !important; top: 46px !important; max-height: calc(100dvh - 130px) !important; }
  /* Combat log smaller and out of the way of the buttons */
  #ui-log { width: 58vw !important; max-height: 96px !important; bottom: 64px; font-size: 11px; }
  #ui-topbar { gap: 10px !important; font-size: 11px !important; padding: 6px 10px !important; flex-wrap: wrap; }
}
@media (max-width: 700px) and (orientation: landscape) {
  #ui-actions { bottom: 8px; }
  #ui-log { bottom: 8px; max-height: 70px !important; }
  #ui-bars { bottom: 4px; }
}
</style>
</head>
<body>
<!-- Auth Screen -->
<div id="screen-auth" class="screen active">
<div class="auth-container">
<h1 class="game-title">MU ONLINE</h1>
<p class="game-subtitle">Browser Edition</p>
<div class="tabs">
<button class="tab active" onclick="showAuthTab('login')">Login</button>
<button class="tab" onclick="showAuthTab('register')">Register</button>
</div>
<form id="login-form" class="auth-form" onsubmit="doLogin(event)">
<input type="text" id="login-username" placeholder="Username" required>
<input type="password" id="login-password" placeholder="Password" required>
<button type="submit" class="btn-primary">Enter Game</button>
</form>
<form id="register-form" class="auth-form hidden" onsubmit="doRegister(event)">
<input type="text" id="reg-username" placeholder="Username (3-16 chars)" required>
<input type="password" id="reg-password" placeholder="Password (4+ chars)" required>
<button type="submit" class="btn-primary">Create Account</button>
</form>
<p id="auth-error" class="error-msg"></p>
<button type="button" class="btn-link" onclick="openImport()" style="font-size:12px;">📥 Import account from another device</button>
</div>
</div>


<!-- Character Select Screen -->
<div id="screen-charselect" class="screen">
<div class="auth-container" style="min-width:500px;">
<h2 style="color:#ffd700;margin-bottom:20px;">Select Character</h2>
<div id="character-list"></div>
<button class="btn-secondary" onclick="showCreateModal()">Create New Character</button>
<br>
<button class="btn-link" onclick="openExport()">📤 Export account (to play on another device)</button>
<button class="btn-link" onclick="doLogout()">Logout</button>
</div>
<div id="create-modal" class="hidden" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:flex;z-index:100;">
<div style="margin:auto;background:#14142a;padding:30px;border-radius:12px;border:1px solid #333;min-width:400px;text-align:center;">
<h3 style="color:#ffd700;margin-bottom:15px;">Create Character</h3>
<input type="text" id="char-name" placeholder="Character Name (2-12)" style="width:100%;padding:10px;background:#1a1a2e;border:1px solid #333;color:#fff;border-radius:4px;">
<div id="class-select" style="display:flex;gap:10px;margin:15px 0;"></div>
<button class="btn-primary" onclick="doCreateChar()">Create</button>
<button class="btn-link" onclick="hideCreateModal()">Cancel</button>
<p id="create-error" class="error-msg"></p>
</div>
</div>
</div>


<!-- Game Screen -->
<div id="screen-game" class="screen">
<canvas id="game-canvas"></canvas>
<div id="game-ui" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;">
<div id="ui-topbar" style="pointer-events:auto;position:absolute;top:0;left:0;right:0;background:rgba(0,0,0,0.85);padding:8px 16px;display:flex;gap:20px;font-size:13px;align-items:center;">

<span id="ui-map" style="color:#88ff88;"></span>

<div id="ui-bars" style="pointer-events:auto;position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:8px;">
<div style="position:relative;width:180px;height:20px;background:#111;border:1px solid #333;border-radius:3px;overflow:hidden;">
<div id="hp-bar" style="height:100%;background:linear-gradient(90deg,#cc0000,#ff3333);width:100%;transition:width 0.3s;"></div>
<span id="hp-text" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:11px;color:#fff;text-shadow:1px 1px 1px #000;"></span>
</div>
<div style="position:relative;width:180px;height:20px;background:#111;border:1px solid #333;border-radius:3px;overflow:hidden;">
<div id="mp-bar" style="height:100%;background:linear-gradient(90deg,#0000cc,#3333ff);width:100%;transition:width 0.3s;"></div>
<span id="mp-text" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:11px;color:#fff;text-shadow:1px 1px 1px #000;"></span>
</div>
<div style="position:relative;width:180px;height:20px;background:#111;border:1px solid #333;border-radius:3px;overflow:hidden;">
<div id="exp-bar" style="height:100%;background:linear-gradient(90deg,#cccc00,#ffff33);width:0%;transition:width 0.3s;"></div>
<span id="exp-text" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:11px;color:#fff;text-shadow:1px 1px 1px #000;"></span>
</div>
</div>
<div id="ui-actions" style="pointer-events:auto;position:absolute;bottom:10px;right:10px;display:flex;gap:6px;"></div>
<div id="ui-log" style="pointer-events:auto;position:absolute;bottom:40px;left:10px;width:320px;max-height:150px;overflow-y:auto;background:rgba(0,0,0,0.75);border-radius:4px;padding:6px;font-size:12px;">

<div id="panel-right" class="hidden" style="pointer-events:auto;position:absolute;top:40px;right:10px;width:320px;max-height:calc(100vh - 100px);background:rgba(14,14,30,0.95);border:1px solid #333;border-radius:8px;padding:16px;overflow-y:auto;"></div>
<div id="item-modal" class="hidden" style="pointer-events:auto;position:absolute;inset:0;background:rgba(0,0,0,0.7);display:flex;z-index:200;" onclick="if(event.target===this)this.classList.add('hidden')">

<script>
// ===== LOCAL STORAGE DATABASE =====
const Store = {
  get(key) { try { return JSON.parse(localStorage.getItem('mu_'+key)); } catch { return null; } },
  set(key, val) { localStorage.setItem('mu_'+key, JSON.stringify(val)); },
  del(key) { localStorage.removeItem('mu_'+key); }
};

function getAccounts() { return Store.get('accounts') || []; }
function saveAccounts(a) { Store.set('accounts', a); }
function getChars() { return Store.get('characters') || []; }
function saveChars(c) { Store.set('characters', c); }
function getInv(charId) { return Store.get('inv_'+charId) || []; }
function saveInv(charId, inv) { Store.set('inv_'+charId, inv); }

// ===== AUTH =====
let currentUser = null;

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showAuthTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('auth-error').textContent = '';
  if (tab === 'login') {
    document.querySelectorAll('.tab')[0].classList.add('active');
    document.getElementById('login-form').classList.remove('hidden');
    document.getElementById('register-form').classList.add('hidden');
  } else {
    document.querySelectorAll('.tab')[1].classList.add('active');
    document.getElementById('login-form').classList.add('hidden');
    document.getElementById('register-form').classList.remove('hidden');
  }
}

function doRegister(e) {
  e.preventDefault();
  const u = document.getElementById('reg-username').value.trim();
  const p = document.getElementById('reg-password').value;
  if (u.length < 3 || u.length > 16) return showErr('Username must be 3-16 chars');
  if (p.length < 4) return showErr('Password must be 4+ chars');
  const accounts = getAccounts();
  if (accounts.find(a => a.username === u)) return showErr('Username already exists');
  accounts.push({ username: u, password: p });
  saveAccounts(accounts);
  currentUser = u;
  Store.set('session', u);
  loadCharSelect();
}

function doLogin(e) {
  e.preventDefault();
  const u = document.getElementById('login-username').value.trim();
  const p = document.getElementById('login-password').value;
  const accounts = getAccounts();
  const acc = accounts.find(a => a.username === u && a.password === p);
  if (!acc) return showErr('Invalid credentials');
  currentUser = u;
  Store.set('session', u);
  loadCharSelect();
}

function doLogout() { Store.del('session'); currentUser = null; showScreen('screen-auth'); }
function showErr(msg) { document.getElementById('auth-error').textContent = msg; }

// ===== ACCOUNT TRANSFER (cross-device export / import) =====
// localStorage is per-device, so accounts don't follow you between browsers/phones.
// These let you carry your whole account (characters + inventory with all item
// options) to another device via a copy-paste code.
function b64encode(str) { return btoa(unescape(encodeURIComponent(str))); }
function b64decode(code) { return decodeURIComponent(escape(atob(code))); }

function exportCodeFor(username) {
  const acc = getAccounts().find(a => a.username === username);
  if (!acc) return null;
  const characters = getChars().filter(c => c.owner === username);
  const inv = {};
  characters.forEach(c => { inv[c.id] = getInv(c.id); });
  return b64encode(JSON.stringify({ v: 1, exportedAt: Date.now(), account: acc, characters, inv }));
}

function importCode(code) {
  let blob;
  try { blob = JSON.parse(b64decode((code || '').trim())); }
  catch (e) { return { ok: false, msg: 'Invalid code - could not read it.' }; }
  if (!blob || !blob.account || !blob.account.username || !Array.isArray(blob.characters)) {
    return { ok: false, msg: 'Invalid account data.' };
  }
  const accounts = getAccounts();
  const ai = accounts.findIndex(a => a.username === blob.account.username);
  if (ai >= 0) accounts[ai] = blob.account; else accounts.push(blob.account);
  saveAccounts(accounts);
  const chars = getChars();
  blob.characters.forEach(ch => { const i = chars.findIndex(x => x.id === ch.id); if (i >= 0) chars[i] = ch; else chars.push(ch); });
  saveChars(chars);
  Object.keys(blob.inv || {}).forEach(id => saveInv(id, blob.inv[id]));
  return { ok: true, msg: 'Imported! Log in as "' + blob.account.username + '" to play your characters here.', username: blob.account.username };
}

function openExport() {
  const code = exportCodeFor(currentUser);
  const modal = document.getElementById('transfer-modal');
  document.getElementById('transfer-title').textContent = '📤 Export Account';
  document.getElementById('transfer-desc').textContent = 'Copy this code, then on your other device tap "Import account" and paste it.';
  const ta = document.getElementById('transfer-text');
  ta.value = code || ''; ta.readOnly = true;
  document.getElementById('transfer-msg').textContent = code ? '' : 'No account to export.';
  document.getElementById('transfer-actions').innerHTML =
    `<button class="btn-secondary" onclick="copyTransfer()">Copy</button>` +
    `<button class="btn-link" onclick="document.getElementById('transfer-modal').classList.add('hidden')">Close</button>`;
  modal.classList.remove('hidden');
}

function openImport() {
  const modal = document.getElementById('transfer-modal');
  document.getElementById('transfer-title').textContent = '📥 Import Account';
  document.getElementById('transfer-desc').textContent = 'Paste the code you exported from your other device, then tap Import.';
  const ta = document.getElementById('transfer-text');
  ta.value = ''; ta.readOnly = false;
  document.getElementById('transfer-msg').textContent = '';
  document.getElementById('transfer-actions').innerHTML =
    `<button class="btn-primary" style="padding:8px 16px;" onclick="doImport()">Import</button>` +
    `<button class="btn-link" onclick="document.getElementById('transfer-modal').classList.add('hidden')">Close</button>`;
  modal.classList.remove('hidden');
}

function doImport() {
  const code = document.getElementById('transfer-text').value;
  const r = importCode(code);
  const msgEl = document.getElementById('transfer-msg');
  msgEl.style.color = r.ok ? '#8f8' : '#ff6666';
  msgEl.textContent = r.msg;
  if (r.ok) {
    const ln = document.getElementById('login-username'); if (ln) ln.value = r.username;
    setTimeout(() => document.getElementById('transfer-modal').classList.add('hidden'), 1600);
  }
}

function copyTransfer() {
  const ta = document.getElementById('transfer-text');
  ta.select();
  try {
    if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(ta.value);
    else document.execCommand('copy');
    document.getElementById('transfer-msg').textContent = 'Copied to clipboard!';
  } catch (e) { document.getElementById('transfer-msg').textContent = 'Press Ctrl/Cmd+C to copy.'; }
}

// ===== CHARACTER SELECT =====
function loadCharSelect() {
  showScreen('screen-charselect');
  const chars = getChars().filter(c => c.owner === currentUser);
  const el = document.getElementById('character-list');
  if (!chars.length) {
    el.innerHTML = '<p style="color:#888;margin:20px;">No characters yet. Create one!</p>';
  } else {
    el.innerHTML = chars.map(c => `
      <div style="display:inline-block;background:#1a1a2e;border:1px solid #333;padding:16px;border-radius:8px;cursor:pointer;min-width:140px;margin:8px;transition:0.2s;" onclick="enterGame('${c.id}')" onmouseover="this.style.borderColor='#ffd700'" onmouseout="this.style.borderColor='#333'">
        <div style="color:#ffd700;font-weight:bold;">${c.name}</div>
        <div style="font-size:12px;color:#888;">${CLASS_DATA[c.cls].name}</div>
        <div style="font-size:12px;color:#888;">Level ${c.level}</div>
        <div style="font-size:11px;color:#ff4444;cursor:pointer;margin-top:8px;" onclick="event.stopPropagation();deleteChar('${c.id}')">✕ Delete</div>
      </div>
    `).join('');
  }
  // Build class select
  document.getElementById('class-select').innerHTML = Object.entries(CLASS_DATA).map(([k,v]) => `
    <div class="cls-opt" data-cls="${k}" onclick="selectClass('${k}')" style="flex:1;padding:12px 8px;background:#1a1a2e;border:2px solid #333;border-radius:8px;cursor:pointer;text-align:center;">
      <div style="width:40px;height:40px;margin:0 auto 6px;border-radius:50%;background:${v.color};"></div>
      <span style="color:#ffd700;font-size:13px;display:block;">${v.name}</span>
      <small style="color:#888;font-size:11px;">${v.desc}</small>
    </div>
  `).join('');
  selectClass('dark_knight');
}

let selectedClass = 'dark_knight';
function selectClass(cls) {
  selectedClass = cls;
  document.querySelectorAll('.cls-opt').forEach(el => {
    el.style.borderColor = el.dataset.cls === cls ? '#ffd700' : '#333';
  });
}

function showCreateModal() { document.getElementById('create-modal').classList.remove('hidden'); document.getElementById('create-error').textContent = ''; }
function hideCreateModal() { document.getElementById('create-modal').classList.add('hidden'); }

function doCreateChar() {
  const name = document.getElementById('char-name').value.trim();
  if (name.length < 2 || name.length > 12) { document.getElementById('create-error').textContent = 'Name: 2-12 chars'; return; }
  const chars = getChars();
  if (chars.find(c => c.name === name)) { document.getElementById('create-error').textContent = 'Name taken'; return; }
  if (chars.filter(c => c.owner === currentUser).length >= 3) { document.getElementById('create-error').textContent = 'Max 3 characters'; return; }
  const cd = CLASS_DATA[selectedClass];
  const id = Date.now().toString(36) + Math.random().toString(36).slice(2,8);
  const ch = { id, owner: currentUser, name, cls: selectedClass, level: 1, exp: 0, hp: cd.baseHp, maxHp: cd.baseHp, mp: cd.baseMp, maxMp: cd.baseMp, str: cd.baseStr, agi: cd.baseAgi, vit: cd.baseVit, ene: cd.baseEne, statPts: 0, zen: 10000, mapId: 'lorencia', px: 130, py: 130 };
  chars.push(ch);
  saveChars(chars);
  // Starting items
  const inv = cd.startItems.map((itemId,i) => ({ uid: id+'_'+i, itemId, equipped: i < 2 ? 1 : 0 }));
  saveInv(id, inv);
  hideCreateModal();
  loadCharSelect();
}

function deleteChar(id) {
  if (!confirm('Delete this character?')) return;
  saveChars(getChars().filter(c => c.id !== id));
  Store.del('inv_'+id);
  loadCharSelect();
}
</script>


<script>
// ===== GAME ENGINE =====
let G = { char: null, inv: [], map: null, mobs: [], companions: [], target: null, moveTo: null, atkCd: 0, running: false, lastT: 0, dmgNums: [], portalAnim: 0, tileVar: [], autoAttack: false, autoLevel: false };
let canvas, ctx;

function enterGame(charId) {
  const chars = getChars();
  G.char = chars.find(c => c.id === charId);
  if (!G.char) return;
  G.inv = getInv(charId);
  loadMap(G.char.mapId);
  showScreen('screen-game');
  canvas = document.getElementById('game-canvas');
  ctx = canvas.getContext('2d');
  resizeCanvas();
  window.onresize = resizeCanvas;
  canvas.onclick = handleClick;
  // Touch support for mobile: tap to move / attack (preventDefault stops scroll, zoom and the ghost click).
  // Property assignment (not addEventListener) so re-entering the game doesn't stack duplicate handlers.
  canvas.ontouchstart = (e) => { e.preventDefault(); handleClick(e); };
  canvas.ontouchmove = (e) => { e.preventDefault(); };
  G.running = true;
  G.lastT = Date.now();
  G.tileVar = Array.from({length:256*256}, () => Math.random()*0.15-0.075);
  spawnCompanions();
  buildActions();
  updateUI();
  gameLog('Welcome to '+G.map.name+'!','system');
  requestAnimationFrame(gameLoop);
}

function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }

function loadMap(mapId) {
  G.map = MAPS[mapId];
  G.mobs = G.map.monsters.map((m,i) => ({ ...MONSTERS[m.id], x:m.x, y:m.y, spawnX:m.x, spawnY:m.y, curHp:MONSTERS[m.id].hp, alive:true, respawn:0, uid:mapId+'_'+i }));
  G.target = null;
  G.moveTo = null;
  // Companions follow you to the new map: reset them next to the player and drop targets
  (G.companions || []).forEach(comp => {
    comp.x = G.char.px + (Math.random()*30 - 15);
    comp.y = G.char.py + (Math.random()*30 - 15);
    comp.target = null;
  });
}

function buildActions() {
  document.getElementById('ui-actions').innerHTML = `
    <button onclick="togglePanel('inv')" title="Inventory" style="width:40px;height:40px;background:rgba(20,20,40,0.9);border:1px solid #444;border-radius:6px;font-size:18px;cursor:pointer;">🎒</button>
    <button onclick="togglePanel('stats')" title="Stats" style="width:40px;height:40px;background:rgba(20,20,40,0.9);border:1px solid #444;border-radius:6px;font-size:18px;cursor:pointer;">📊</button>
    <button id="btn-auto-atk" onclick="toggleAutoAttack()" title="Auto-Attack (auto-target & fight)" style="width:40px;height:40px;background:rgba(20,20,40,0.9);border:1px solid #444;border-radius:6px;font-size:18px;cursor:pointer;">⚔️</button>
    <button onclick="doRest()" title="Rest" style="width:40px;height:40px;background:rgba(20,20,40,0.9);border:1px solid #444;border-radius:6px;font-size:18px;cursor:pointer;">💤</button>
    <button onclick="saveAndQuit()" title="Save & Quit" style="width:40px;height:40px;background:rgba(20,20,40,0.9);border:1px solid #444;border-radius:6px;font-size:18px;cursor:pointer;">🚪</button>
  `;
}

function gameLoop() {
  if (!G.running) return;
  const now = Date.now();
  const dt = Math.min(50, now - G.lastT);
  G.lastT = now;
  update(dt);
  render();
  requestAnimationFrame(gameLoop);
}

function update(dt) {
  const c = G.char;
  // Auto-attack: automatically pick and chase the nearest monster (range depends on class)
  if (G.autoAttack) {
    let cur = G.target && G.mobs.find(x => x.uid === G.target);
    if (!cur || !cur.alive) {
      let best = null, bd = Infinity;
      for (const m of G.mobs) { if (!m.alive) continue; const d = Math.hypot(m.x - c.px, m.y - c.py); if (d < bd) { bd = d; best = m; } }
      if (best) { G.target = best.uid; cur = best; }
    }
    if (cur && cur.alive) {
      const d = Math.hypot(cur.x - c.px, cur.y - c.py);
      if (d >= attackRangeOf(c.cls)) G.moveTo = { x: cur.x, y: cur.y }; else G.moveTo = null;
    }
  }
  // Movement
  if (G.moveTo) {
    const dx = G.moveTo.x - c.px, dy = G.moveTo.y - c.py;
    const dist = Math.sqrt(dx*dx+dy*dy);
    if (dist < 3) { G.moveTo = null; }
    else { const spd = 2.5; c.px += (dx/dist)*spd; c.py += (dy/dist)*spd; }
  }
  // Attack cooldown
  if (G.atkCd > 0) G.atkCd -= dt;
  // Auto-attack
  if (G.target && G.atkCd <= 0) {
    const m = G.mobs.find(x => x.uid === G.target);
    if (m && m.alive) {
      const dx = m.x - c.px, dy = m.y - c.py;
      if (Math.sqrt(dx*dx+dy*dy) < attackRangeOf(c.cls)) { G.moveTo = null; doAttack(m); }
    } else { G.target = null; }
  }
  // Companion bots: follow the player, only engage monsters near the player
  updateCompanions(dt);
  // Monster respawn
  G.mobs.forEach(m => { if (!m.alive) { m.respawn -= dt; if (m.respawn <= 0) { m.alive = true; m.curHp = m.hp; m.x = m.spawnX; m.y = m.spawnY; } } });
  // Portal check
  G.map.portals.forEach(p => {
    const dx = p.x - c.px, dy = p.y - c.py;
    if (Math.sqrt(dx*dx+dy*dy) < 10) { c.mapId = p.to; c.px = p.tx; c.py = p.ty; loadMap(p.to); gameLog('Entered '+G.map.name+'!','system'); updateUI(); saveGame(); }
  });
}

// ===== ITEM OPTIONS / ATTRIBUTES =====
// Owned item instances ({uid,itemId,equipped,...}) may carry extra attributes:
//   plus  : upgrade level (+1..+15)        lucky : +Luck (crit + lucky damage)
//   skill : weapon has a skill             add   : additional option (flat dmg/def)
//   exc[] : "excellent" option codes (see below)
const EXC_WEAPON = [
  { code: 'excDmg',     label: 'Increase Damage +2%' },
  { code: 'excDmgRate', label: 'Excellent Damage Rate +10%' },
  { code: 'excSpeed',   label: 'Increase Attack Speed +10' },
  { code: 'excLife',    label: 'Life after monster +HP' }
];
const EXC_ARMOR = [
  { code: 'excHp',      label: 'Increase HP +4%' },
  { code: 'excMp',      label: 'Increase Mana +4%' },
  { code: 'excDefRate', label: 'Damage Decrease +4%' }
];
const EXC_LABELS = {};
EXC_WEAPON.concat(EXC_ARMOR).forEach(e => { EXC_LABELS[e.code] = e.label; });

// Roll random options for a looted (equippable) item.
function rollItemOptions(itemId) {
  const it = ITEMS[itemId];
  const o = {};
  if (!it || !it.slot) return o; // only equipment gets options
  if (Math.random() < 0.5)  o.plus = 1 + Math.floor(Math.random() * 6);   // +1..+6
  if (Math.random() < 0.2)  o.lucky = 1;
  if (Math.random() < 0.15 && it.slot === 'weapon') o.skill = 1;
  if (Math.random() < 0.25) o.add = 1 + Math.floor(Math.random() * 4);     // additional option
  if (Math.random() < 0.18) {                                              // excellent (1-2 opts)
    const pool = it.slot === 'weapon' ? EXC_WEAPON : EXC_ARMOR;
    const count = 1 + Math.floor(Math.random() * 2);
    const used = {}; o.exc = [];
    for (let k = 0; k < count; k++) {
      const pick = pool[Math.floor(Math.random() * pool.length)];
      if (used[pick.code]) continue; used[pick.code] = 1; o.exc.push(pick.code);
    }
  }
  return o;
}
function isExcellent(i) { return !!(i && i.exc && i.exc.length); }

// ===== DERIVED STATS =====
// Centralised stat calculation. AGI contributes to DEFENSE and to an EVADE / dodge
// chance; equipped item options add damage, defense, crit, excellent/lucky chances,
// attack speed and bonus max HP/MP.
function computeStats(c, inv) {
  const cd = CLASS_DATA[c.cls] || {};
  let weaponAtk = 0, armorDef = 0, weaponPlus = 0, armorPlus = 0, addDmgFlat = 0, addDefFlat = 0;
  let excDmgPct = 0, excSpeed = 0, excHpPct = 0, excMpPct = 0, excDefPct = 0;
  let excRateCount = 0, luckyCount = 0, skillCount = 0, hasExc = false;
  (inv || []).filter(i => i.equipped).forEach(i => {
    const it = ITEMS[i.itemId];
    if (!it) return;
    if (it.attack) weaponAtk += it.attack;
    if (it.defense) armorDef += it.defense;
    const plus = i.plus || 0, add = i.add || 0;
    if (it.slot === 'weapon') { weaponPlus += plus; addDmgFlat += add * 4; }
    else if (it.slot) { armorPlus += plus; addDefFlat += add * 4; }
    if (i.lucky) luckyCount++;
    if (i.skill) skillCount++;
    (i.exc || []).forEach(code => {
      hasExc = true;
      if (code === 'excDmg') excDmgPct += 0.02;
      else if (code === 'excDmgRate') excRateCount++;
      else if (code === 'excSpeed') excSpeed += 0.1;
      else if (code === 'excHp') excHpPct += 0.04;
      else if (code === 'excMp') excMpPct += 0.04;
      else if (code === 'excDefRate') excDefPct += 0.04;
    });
  });
  // Outgoing damage: stat + weapon + upgrade + additional option, then excellent %
  const statAtk = c.str * (cd.dmgPerStr || 1) + c.agi * (cd.dmgPerAgi || 0.3);
  const baseDmg = (statAtk + weaponAtk + weaponPlus * 3 + addDmgFlat) * (1 + excDmgPct);
  const minDmg = Math.max(1, Math.floor(baseDmg * 0.8));
  const maxDmg = Math.max(1, Math.floor(baseDmg * 1.2));
  // AGI + armor + upgrade + additional option -> Defense
  const agiDef = Math.floor(c.agi / 4);                 // AGI is the PRIMARY defense source (all classes)
  // The class main stat gives a SMALLER defense bonus: STR for Dark Knight, ENE for Dark Wizard.
  // (Elf's main stat is AGI, already counted above.)
  const mainStat = mainStatOf(c.cls);
  const mainDef = mainStat === 'agi' ? 0 : Math.floor((c[mainStat] || 0) / 12);
  const defense = armorDef + agiDef + mainDef + armorPlus * 2 + addDefFlat;
  // AGI -> Evade / Dodge chance (0..60%)
  const evade = Math.min(0.6, (c.agi + (c.level || 1) * 0.5) / 600);
  // Attack speed (AGI + excellent speed), crit (AGI + luck)
  const atkSpeed = (cd.speed || 1) + c.agi * 0.01 + excSpeed;
  const crit = Math.min(0.6, c.agi / 600 + luckyCount * 0.05);
  // Damage-type chances for the floating combat numbers
  const excChance = hasExc ? Math.min(0.5, 0.02 + excRateCount * 0.10) : 0;
  const luckChance = Math.min(0.4, luckyCount * 0.10);
  const dmgReduce = Math.min(0.5, excDefPct);
  // Excellent armor options raise effective max HP / MP
  const maxHp = Math.floor((c.maxHp || 0) * (1 + excHpPct));
  const maxMp = Math.floor((c.maxMp || 0) * (1 + excMpPct));
  return { weaponAtk, armorDef, baseDmg, minDmg, maxDmg, agiDef, defense, evade, atkSpeed, crit,
           excChance, luckChance, dmgReduce, maxHp, maxMp, excHpPct, excMpPct,
           weaponPlus, armorPlus, addDmgFlat, addDefFlat, skillCount, luckyCount, mainDef };
}

// Effective max HP/MP (includes excellent option bonuses)
function maxHpOf(c) { return computeStats(c, G.inv).maxHp || c.maxHp; }
function maxMpOf(c) { return computeStats(c, G.inv).maxMp || c.maxMp; }

// ===== AUTO-ATTACK & AUTO-LEVEL =====
function mainStatOf(cls) { return cls === 'dark_wizard' ? 'ene' : (cls === 'fairy_elf' ? 'agi' : 'str'); }
// Dark Knight is melee (short reach); Dark Wizard & Fairy Elf are ranged (longer reach).
function isRanged(cls) { return cls === 'dark_wizard' || cls === 'fairy_elf'; }
function attackRangeOf(cls) { return isRanged(cls) ? 46 : 22; }

function toggleAutoAttack() {
  G.autoAttack = !G.autoAttack;
  const b = document.getElementById('btn-auto-atk');
  if (b) { b.style.background = G.autoAttack ? '#1e3a1e' : 'rgba(20,20,40,0.9)'; b.style.borderColor = G.autoAttack ? '#6f6' : '#444'; }
  gameLog('Auto-attack ' + (G.autoAttack ? 'ON' : 'OFF'), 'system');
  if (currentPanel === 'stats') renderStats();
}
function toggleAutoLevel() {
  G.autoLevel = !G.autoLevel;
  gameLog('Auto-level ' + (G.autoLevel ? 'ON' : 'OFF'), 'system');
  if (G.autoLevel) autoAllocate();
  if (currentPanel === 'stats') renderStats();
}
function autoAllocate() {
  const c = G.char;
  if (c.statPts <= 0) return;
  const main = mainStatOf(c.cls);
  const n = c.statPts;
  c[main] += n; c.statPts = 0;
  const cd = CLASS_DATA[c.cls];
  if (main === 'vit') c.maxHp = cd.baseHp + (c.vit - cd.baseVit) * cd.hpPerVit;
  if (main === 'ene') c.maxMp = cd.baseMp + (c.ene - cd.baseEne) * cd.mpPerEne;
  gameLog('Auto-allocated ' + n + ' point' + (n > 1 ? 's' : '') + ' to ' + main.toUpperCase(), 'system');
  if (currentPanel === 'stats') renderStats();
  updateUI(); saveGame();
}

// ===== COMPANION BOTS ("multiplayer feel") =====
// 2-4 NPC "players" that follow you around and only attack monsters near YOUR
// current position. They drop a far / previous target and prioritise following.
const COMPANION_NAMES = ['Aoki','Zephyr','Kserk','Lunaa','Drako','Mira','Vexx','Nyx','Orin','Talon','Sora','Riven','Kael','Pyra','Bolt','Echo','Frost','Sable'];
// Tunables (all in world units)
const BOT_FOLLOW_MAX = 48;  // if farther than this from you, abandon combat and catch up
const BOT_AGGRO = 60;       // only target monsters within this radius of YOU
const BOT_LEASH = 80;       // drop the target if it drifts farther than this from YOU
const BOT_ATK_RANGE = 16;

function spawnCompanions() {
  const n = 2 + Math.floor(Math.random() * 3); // 2-4
  const classes = Object.keys(CLASS_DATA);
  const pool = COMPANION_NAMES.slice();
  G.companions = [];
  for (let i = 0; i < n; i++) {
    let name = 'Player' + (i + 1);
    if (pool.length) name = pool.splice(Math.floor(Math.random() * pool.length), 1)[0];
    const cls = classes[Math.floor(Math.random() * classes.length)];
    const level = Math.max(1, (G.char.level || 1) + Math.floor(Math.random() * 7) - 3);
    G.companions.push({
      name, cls, level, color: CLASS_DATA[cls].color,
      x: G.char.px + (Math.random() * 30 - 15),
      y: G.char.py + (Math.random() * 30 - 15),
      target: null, atkCd: Math.random() * 800, swing: 0
    });
  }
}

function updateCompanions(dt) {
  const c = G.char;
  (G.companions || []).forEach(comp => {
    if (comp.atkCd > 0) comp.atkCd -= dt;
    if (comp.swing > 0) comp.swing -= dt;
    const dpx = c.px - comp.x, dpy = c.py - comp.y;
    const distPlayer = Math.sqrt(dpx * dpx + dpy * dpy) || 0.0001;

    // 1) Validate the current target: it must still be alive AND remain close to
    //    the player's CURRENT position. This is what stops bots from getting stuck
    //    attacking the previous monster after you walk away.
    if (comp.target) {
      const tm = G.mobs.find(x => x.uid === comp.target);
      if (!tm || !tm.alive) {
        comp.target = null;
      } else {
        const tdx = tm.x - c.px, tdy = tm.y - c.py;
        if (Math.sqrt(tdx * tdx + tdy * tdy) > BOT_LEASH) comp.target = null; // far/previous -> drop
      }
    }

    // 2) Following ALWAYS takes priority: if we've drifted too far from you, drop
    //    whatever we were doing and run back to you.
    if (distPlayer > BOT_FOLLOW_MAX) {
      comp.target = null;
      const spd = 2.9; // slightly faster than the player so they can keep up
      comp.x += (dpx / distPlayer) * spd;
      comp.y += (dpy / distPlayer) * spd;
      return;
    }

    // 3) Near you: acquire a target only among monsters close to YOU, picking the
    //    one nearest to the companion.
    if (!comp.target) {
      let best = null, bestD = Infinity;
      for (const m of G.mobs) {
        if (!m.alive) continue;
        const mdx = m.x - c.px, mdy = m.y - c.py;
        if (Math.sqrt(mdx * mdx + mdy * mdy) > BOT_AGGRO) continue; // not near the player -> ignore
        const cdx = m.x - comp.x, cdy = m.y - comp.y;
        const d = Math.sqrt(cdx * cdx + cdy * cdy);
        if (d < bestD) { bestD = d; best = m; }
      }
      if (best) comp.target = best.uid;
    }

    // 4) Engage the (nearby) target, otherwise loosely follow you.
    if (comp.target) {
      const tm = G.mobs.find(x => x.uid === comp.target);
      if (tm && tm.alive) {
        const adx = tm.x - comp.x, ady = tm.y - comp.y;
        const adist = Math.sqrt(adx * adx + ady * ady) || 0.0001;
        if (adist > BOT_ATK_RANGE) {
          const spd = 2.6;
          comp.x += (adx / adist) * spd;
          comp.y += (ady / adist) * spd;
        } else if (comp.atkCd <= 0) {
          companionAttack(comp, tm);
        }
      }
    } else if (distPlayer > 18) {
      const spd = 1.8; // hover around you at a comfortable spacing
      comp.x += (dpx / distPlayer) * spd;
      comp.y += (dpy / distPlayer) * spd;
    }
  });
}

function companionAttack(comp, m) {
  comp.atkCd = 850 + Math.random() * 350;
  comp.swing = 200;
  const base = (comp.level || 1) * 1.2 + 4;
  const dmg = Math.max(1, Math.floor(base * (0.8 + Math.random() * 0.4)));
  m.curHp -= dmg;
  addDmg(m.x, m.y - 10, dmg, '#9fd3ff');
  if (m.curHp <= 0) killMonster(m); // assist credit: rewards still go to the player
}

function doAttack(m) {
  const c = G.char;
  const st = computeStats(c, G.inv);
  G.atkCd = Math.max(300, Math.floor(1000 / (st.atkSpeed || 1)));
  // Player hits the monster. Roll the damage TYPE (precedence: excellent > crit > lucky > normal),
  // each shown in its own colour.
  let pDmg = Math.max(1, Math.floor(st.baseDmg * (0.8 + Math.random() * 0.4)));
  let type = 'normal', color = '#ffe066', suffix = '';
  if (Math.random() < st.excChance)       { pDmg = Math.floor(pDmg * 1.3); type = 'excellent'; color = '#5dff7a'; }
  else if (Math.random() < st.crit)        { pDmg = Math.floor(pDmg * 1.5); type = 'critical';  color = '#ff9a1f'; suffix = '!'; }
  else if (Math.random() < st.luckChance)  { pDmg = Math.floor(pDmg * 1.25); type = 'lucky';     color = '#5fd0ff'; }
  m.curHp -= pDmg;
  addDmg(m.x, m.y - 10, pDmg + suffix, color);
  // Monster strikes back -- AGI-based evade can make it MISS; excellent armor reduces the rest.
  let mDmg = 0, dodged = false;
  if (Math.random() < st.evade) {
    dodged = true;
    addDmg(c.px, c.py - 10, 'MISS', '#88ddff');
  } else {
    mDmg = Math.max(1, Math.floor((m.attack * (0.8 + Math.random() * 0.4) - st.defense * 0.5) * (1 - st.dmgReduce)));
    c.hp = Math.max(0, c.hp - mDmg);
    addDmg(c.px, c.py - 10, mDmg, '#ff4444');
  }
  const tag = type !== 'normal' ? ' (' + type + ')' : '';
  gameLog(dodged
    ? `Hit ${m.name} for ${pDmg}${tag}! Dodged its attack.`
    : `Hit ${m.name} for ${pDmg}${tag}! Took ${mDmg} dmg.`, 'combat');
  if (m.curHp <= 0) { killMonster(m); }
  if (c.hp <= 0) { playerDied(); }
  updateUI();
}

function killMonster(m) {
  m.alive = false; m.respawn = 15000;
  G.target = null;
  (G.companions || []).forEach(cc => { if (cc.target === m.uid) cc.target = null; });
  const c = G.char;
  const expG = m.exp, zenG = m.zen + Math.floor(Math.random()*m.zen*0.5);
  c.exp += expG; c.zen += zenG;
  gameLog(`Killed ${m.name}! +${expG} EXP +${zenG} Zen`,'system');
  // Drops
  (m.drops||[]).forEach(d => { if (Math.random() < d.chance) {
    const uid = Date.now().toString(36)+Math.random().toString(36).slice(2,6);
    const li = Object.assign({uid, itemId:d.id, equipped:0}, rollItemOptions(d.id));
    G.inv.push(li);
    gameLog('Loot: ' + itemLabel(li) + (isExcellent(li) ? ' [Excellent]' : ''), 'loot');
  }});
  // Level up
  const needed = expForLevel(c.level);
  if (c.exp >= needed) {
    c.exp -= needed; c.level++; c.statPts += 5;
    const cd = CLASS_DATA[c.cls];
    c.maxHp += cd.hpPerLevel; c.maxMp += cd.mpPerLevel;
    gameLog(`LEVEL UP! Now level ${c.level}! +5 stat points`,'system');
    if (G.autoLevel) autoAllocate();
    c.hp = maxHpOf(c); c.mp = maxMpOf(c);
  }
  saveGame();
}

function playerDied() {
  G.char.hp = Math.floor(maxHpOf(G.char) * 0.5);
  G.char.px = 130; G.char.py = 130;
  G.target = null; G.moveTo = null;
  gameLog('You died! Respawning in town...','combat');
  saveGame();
}

function expForLevel(lv) { return Math.floor(100 * Math.pow(1.5, lv-1)); }

function handleClick(e) {
  const rect = canvas.getBoundingClientRect();
  const cam = getCamera();
  const pt = (e.touches && e.touches[0]) ? e.touches[0]
           : (e.changedTouches && e.changedTouches[0]) ? e.changedTouches[0]
           : e;
  const wx = (pt.clientX - rect.left + cam.x) / 4;
  const wy = (pt.clientY - rect.top + cam.y) / 4;
  // Check monster click
  for (const m of G.mobs) {
    if (!m.alive) continue;
    if (Math.sqrt((m.x-wx)**2+(m.y-wy)**2) < 12) { G.target = m.uid; G.moveTo = {x:m.x,y:m.y}; gameLog(`Targeting ${m.name}`,'info'); return; }
  }
  // Check NPC click
  for (const n of G.map.npcs) {
    if (Math.sqrt((n.x-wx)**2+(n.y-wy)**2) < 12) {
      if (Math.sqrt((n.x-G.char.px)**2+(n.y-G.char.py)**2) < 40) { openShop(n.id, n.name); }
      else { G.moveTo = {x:n.x,y:n.y}; }
      return;
    }
  }
  G.target = null; G.moveTo = {x:wx,y:wy};
}
</script>


<script>
// ===== RENDERER =====
function getCamera() {
  return { x: G.char.px*4 - canvas.width/2, y: G.char.py*4 - canvas.height/2 };
}

function render() {
  const cam = getCamera();
  const c = G.char, map = G.map;
  ctx.fillStyle = map.bg; ctx.fillRect(0,0,canvas.width,canvas.height);
  // Ground tiles
  const ts = 32;
  const sc = Math.floor(cam.x/ts), sr = Math.floor(cam.y/ts);
  const ec = sc+Math.ceil(canvas.width/ts)+1, er = sr+Math.ceil(canvas.height/ts)+1;
  for (let r=sr;r<er;r++) for (let cl=sc;cl<ec;cl++) {
    if (cl<0||r<0||cl>=128||r>=128) continue;
    const x=cl*ts-cam.x, y=r*ts-cam.y;
    const v = G.tileVar[(r*128+cl)%G.tileVar.length];
    ctx.fillStyle = adjColor(map.bg, v); ctx.fillRect(x,y,ts,ts);
    ctx.strokeStyle='rgba(0,0,0,0.08)'; ctx.strokeRect(x,y,ts,ts);
  }
  // Safe zone
  if (map.safe) { const s=map.safe; ctx.fillStyle='rgba(100,200,100,0.06)'; ctx.fillRect(s.x1*4-cam.x,s.y1*4-cam.y,(s.x2-s.x1)*4,(s.y2-s.y1)*4); ctx.strokeStyle='rgba(100,200,100,0.25)'; ctx.strokeRect(s.x1*4-cam.x,s.y1*4-cam.y,(s.x2-s.x1)*4,(s.y2-s.y1)*4); }
  // Portals
  G.portalAnim += 0.05;
  map.portals.forEach(p => { const sx=p.x*4-cam.x, sy=p.y*4-cam.y, gl=Math.sin(G.portalAnim)*0.3+0.7; ctx.beginPath(); ctx.arc(sx,sy,20,0,Math.PI*2); ctx.fillStyle=`rgba(100,150,255,${gl*0.4})`; ctx.fill(); ctx.strokeStyle=`rgba(150,200,255,${gl})`; ctx.lineWidth=2; ctx.stroke(); ctx.fillStyle='#fff'; ctx.font='11px sans-serif'; ctx.textAlign='center'; ctx.fillText(p.label,sx,sy+30); });
  // NPCs
  map.npcs.forEach(n => { const sx=n.x*4-cam.x, sy=n.y*4-cam.y; ctx.beginPath(); ctx.arc(sx,sy,14,0,Math.PI*2); ctx.fillStyle='#44aaff'; ctx.fill(); ctx.strokeStyle='#88ccff'; ctx.lineWidth=2; ctx.stroke(); ctx.fillStyle='#88ccff'; ctx.font='11px sans-serif'; ctx.textAlign='center'; ctx.fillText(n.name,sx,sy-20); ctx.fillStyle='#ffff00'; ctx.font='bold 14px sans-serif'; ctx.fillText('!',sx,sy+5); });
  // Monsters
  G.mobs.forEach(m => { if (!m.alive) return; const sx=m.x*4-cam.x, sy=m.y*4-cam.y; if(sx<-40||sx>canvas.width+40||sy<-40||sy>canvas.height+40) return; ctx.beginPath(); ctx.arc(sx,sy,12,0,Math.PI*2); ctx.fillStyle=monColor(m.level); ctx.fill(); if(G.target===m.uid){ctx.strokeStyle='#ff0000';ctx.lineWidth=3;ctx.stroke();} ctx.fillStyle='#fff';ctx.font='10px sans-serif';ctx.textAlign='center';ctx.fillText(m.name,sx,sy-18); const hp=m.curHp/m.hp; ctx.fillStyle='#333';ctx.fillRect(sx-15,sy-14,30,4); ctx.fillStyle=hp>0.5?'#0c0':hp>0.25?'#cc0':'#c00';ctx.fillRect(sx-15,sy-14,30*hp,4); });
  // Companion "players" (multiplayer feel) - drawn like players with name + Lv.X
  (G.companions||[]).forEach(comp => {
    const cx2=comp.x*4-cam.x, cy2=comp.y*4-cam.y;
    if(cx2<-40||cx2>canvas.width+40||cy2<-40||cy2>canvas.height+40) return;
    if(comp.swing>0){ ctx.beginPath(); ctx.arc(cx2,cy2,18,0,Math.PI*2); ctx.strokeStyle='rgba(255,255,150,0.5)'; ctx.lineWidth=2; ctx.stroke(); }
    ctx.beginPath(); ctx.arc(cx2,cy2,13,0,Math.PI*2); ctx.fillStyle=comp.color; ctx.fill(); ctx.strokeStyle='#9fd3ff'; ctx.lineWidth=2; ctx.stroke();
    ctx.fillStyle='#fff'; ctx.font='bold 10px sans-serif'; ctx.textAlign='center'; ctx.fillText('Lv.'+comp.level,cx2,cy2-30);
    ctx.fillStyle='#9fd3ff'; ctx.font='bold 11px sans-serif'; ctx.fillText(comp.name,cx2,cy2-19);
  });
  // Player
  const px=c.px*4-cam.x, py=c.py*4-cam.y;
  ctx.beginPath(); ctx.arc(px,py,14,0,Math.PI*2); ctx.fillStyle=CLASS_DATA[c.cls].color; ctx.fill(); ctx.strokeStyle='#ffd700'; ctx.lineWidth=2; ctx.stroke();
  ctx.fillStyle='#ffd700'; ctx.font='bold 12px sans-serif'; ctx.textAlign='center'; ctx.fillText(c.name,px,py-20);
  ctx.fillStyle='#fff'; ctx.font='bold 10px sans-serif'; ctx.fillText(c.level,px,py+4);
  // Move indicator
  if (G.moveTo) { const tx=G.moveTo.x*4-cam.x, ty=G.moveTo.y*4-cam.y; ctx.beginPath();ctx.arc(tx,ty,5,0,Math.PI*2);ctx.strokeStyle='rgba(255,255,255,0.4)';ctx.lineWidth=1;ctx.stroke(); }
  // Damage numbers
  G.dmgNums = G.dmgNums.filter(d => { d.life--; d.dy-=0.5; const sx=d.x*4-cam.x, sy=d.y*4-cam.y+d.dy; ctx.globalAlpha=d.life/60; ctx.fillStyle=d.color; ctx.font='bold 14px sans-serif'; ctx.textAlign='center'; ctx.fillText(d.val,sx,sy); ctx.globalAlpha=1; return d.life>0; });
}

function adjColor(hex, amt) { const n=parseInt(hex.replace('#',''),16); let r=(n>>16)&255,g=(n>>8)&255,b=n&255; r=Math.max(0,Math.min(255,Math.floor(r*(1+amt)))); g=Math.max(0,Math.min(255,Math.floor(g*(1+amt)))); b=Math.max(0,Math.min(255,Math.floor(b*(1+amt)))); return `rgb(${r},${g},${b})`; }
function monColor(lv) { if(lv<=3) return '#88cc44'; if(lv<=8) return '#cc8844'; if(lv<=15) return '#cc4444'; if(lv<=22) return '#8844cc'; return '#cc44cc'; }
function addDmg(x,y,val,color) { G.dmgNums.push({x,y,val,color,life:60,dy:0}); }

// ===== UI =====
function updateUI() {
  const c = G.char, needed = expForLevel(c.level);
  const st = computeStats(c, G.inv);
  const mhp = st.maxHp || c.maxHp, mmp = st.maxMp || c.maxMp;
  document.getElementById('ui-charname').textContent = c.name;
  document.getElementById('ui-level').textContent = 'Lv.'+c.level;
  document.getElementById('ui-class').textContent = CLASS_DATA[c.cls].name;
  document.getElementById('ui-map').textContent = G.map.name;
  document.getElementById('ui-zen').textContent = '💰 '+c.zen.toLocaleString()+' Zen';
  document.getElementById('hp-bar').style.width = Math.max(0, Math.min(100, c.hp/mhp*100))+'%';
  document.getElementById('hp-text').textContent = c.hp+'/'+mhp;
  document.getElementById('mp-bar').style.width = Math.max(0, Math.min(100, c.mp/mmp*100))+'%';
  document.getElementById('mp-text').textContent = c.mp+'/'+mmp;
  document.getElementById('exp-bar').style.width = (c.exp/needed*100)+'%';
  document.getElementById('exp-text').textContent = c.exp+'/'+needed;
}

function gameLog(msg, type) {
  const el = document.getElementById('log-messages');
  const colors = {combat:'#ff8888',system:'#88ff88',loot:'#ffcc44',info:'#88ccff'};
  const d = document.createElement('div');
  d.style.cssText = `padding:2px 0;border-bottom:1px solid rgba(255,255,255,0.05);color:${colors[type]||'#ccc'}`;
  d.textContent = msg;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
  while (el.children.length > 50) el.removeChild(el.firstChild);
}

function doRest() {
  const c = G.char;
  const mhp = maxHpOf(c), mmp = maxMpOf(c);
  c.hp = Math.min(mhp, c.hp + Math.floor(mhp*0.15));
  c.mp = Math.min(mmp, c.mp + Math.floor(mmp*0.15));
  gameLog('Resting... recovered HP/MP','system');
  updateUI(); saveGame();
}

function saveGame() {
  const chars = getChars();
  const idx = chars.findIndex(x => x.id === G.char.id);
  if (idx >= 0) chars[idx] = G.char;
  saveChars(chars);
  saveInv(G.char.id, G.inv);
}

function saveAndQuit() { saveGame(); G.running = false; loadCharSelect(); }
</script>


<script>
// ===== PANELS (Inventory, Stats, Shop) =====
let currentPanel = null;

function togglePanel(type) {
  const panel = document.getElementById('panel-right');
  if (currentPanel === type) { panel.classList.add('hidden'); currentPanel = null; return; }
  currentPanel = type;
  panel.classList.remove('hidden');
  if (type === 'inv') renderInventory();
  else if (type === 'stats') renderStats();
}

// ----- Item display helpers -----
function itemLabel(i) {
  const it = ITEMS[i.itemId]; if (!it) return '???';
  let n = it.name;
  if (i.plus) n += ' +' + i.plus;
  if (i.lucky) n += ' +Luck';
  if (i.skill) n += ' +Skill';
  return n;
}
function itemColor(i) {
  const it = ITEMS[i.itemId];
  if (isExcellent(i)) return '#5dff7a';
  if (i && i.lucky) return '#5fd0ff';
  if (it && it.type === 'misc') return '#c98bff';
  return '#fff';
}
function itemSummary(i) {
  const it = ITEMS[i.itemId]; if (!it) return '';
  const p = [];
  if (it.attack) p.push('ATK ' + (it.attack + (i.plus||0)*3 + (i.add||0)*4));
  if (it.magic) p.push('MAG ' + it.magic);
  if (it.defense) p.push('DEF ' + (it.defense + (i.plus||0)*2 + (i.add||0)*4));
  if (it.healHp) p.push('+' + it.healHp + ' HP');
  if (it.healMp) p.push('+' + it.healMp + ' MP');
  if (i.skill) p.push('Skill');
  if (i.lucky) p.push('Luck');
  if (i.exc && i.exc.length) p.push('Exc x' + i.exc.length);
  return p.join(' · ') || (it.desc || '');
}
// Build the attribute popup for an item (itemId + optional options object)
function detailHTML(itemId, o) {
  const it = ITEMS[itemId]; o = o || {};
  if (!it) return '';
  const exc = o.exc || [];
  const titleCol = exc.length ? '#5dff7a' : (o.lucky ? '#5fd0ff' : '#ffd700');
  const name = it.name + (o.plus ? ' +' + o.plus : '') + (o.lucky ? ' +Luck' : '') + (o.skill ? ' +Skill' : '');
  let h = `<div style="text-align:center;color:${titleCol};font-weight:bold;font-size:16px;margin-bottom:6px;">${name}</div>`;
  h += `<div style="color:#888;font-size:12px;text-align:center;margin-bottom:10px;">${it.desc||''}</div>`;
  const rows = [];
  if (it.type) rows.push(['Type', it.type + (it.slot && it.slot !== it.type ? ' / ' + it.slot : '')]);
  if (it.attack) rows.push(['Attack', '+' + (it.attack + (o.plus||0)*3 + (o.add||0)*4)]);
  if (it.magic) rows.push(['Magic', '+' + it.magic]);
  if (it.defense) rows.push(['Defense', '+' + (it.defense + (o.plus||0)*2 + (o.add||0)*4)]);
  if (it.healHp) rows.push(['Restores HP', '+' + it.healHp]);
  if (it.healMp) rows.push(['Restores MP', '+' + it.healMp]);
  if (o.add) rows.push(['Additional Option', it.slot === 'weapon' ? '+' + (o.add*4) + ' damage' : '+' + (o.add*4) + ' defense']);
  if (it.price) rows.push(['Value', it.price.toLocaleString() + ' Zen']);
  const h2 = rows.map(r => `<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #222;font-size:13px;"><span style="color:#aaa;">${r[0]}</span><span style="color:#fff;">${r[1]}</span></div>`).join('');
  let ex = '';
  if (o.skill) ex += `<div style="color:#ffcc66;font-size:12px;padding:3px 0;">★ Skill</div>`;
  if (o.lucky) ex += `<div style="color:#5fd0ff;font-size:12px;padding:3px 0;">✦ Luck (+5% Critical, enables Lucky damage)</div>`;
  if (exc.length) {
    ex += `<div style="color:#5dff7a;font-size:12px;margin-top:6px;font-weight:bold;">Excellent Options</div>`;
    exc.forEach(code => { ex += `<div style="color:#5dff7a;font-size:12px;padding:2px 0 2px 8px;">• ${EXC_LABELS[code]||code}</div>`; });
  }
  return h + h2 + ex + `<div style="text-align:center;margin-top:12px;"><button onclick="document.getElementById('item-modal').classList.add('hidden')" style="padding:6px 16px;background:#16213e;border:1px solid #ffd700;color:#ffd700;border-radius:4px;cursor:pointer;">Close</button></div>`;
}
function showItemDetail(uid) {
  const i = G.inv.find(x => x.uid === uid); if (!i) return;
  document.getElementById('item-modal-body').innerHTML = detailHTML(i.itemId, i);
  document.getElementById('item-modal').classList.remove('hidden');
}
function showShopDetail(itemId) {
  document.getElementById('item-modal-body').innerHTML = detailHTML(itemId, {});
  document.getElementById('item-modal').classList.remove('hidden');
}

function renderInventory() {
  const equipped = G.inv.filter(i => i.equipped);
  const bag = G.inv.filter(i => !i.equipped);
  let html = `<h3 style="color:#ffd700;margin-bottom:12px;">Inventory <button onclick="document.getElementById('panel-right').classList.add('hidden');currentPanel=null;" style="float:right;background:none;border:none;color:#888;cursor:pointer;font-size:18px;">✕</button></h3>`;
  html += '<div style="color:#aaa;font-size:12px;margin-bottom:6px;">Equipped:</div>';
  equipped.forEach(i => { const it = ITEMS[i.itemId]; html += `<div style="display:flex;align-items:center;gap:8px;padding:6px;margin:4px 0;background:#1a1a2e;border:1px solid ${itemColor(i)==='#fff'?'#ffd700':itemColor(i)};border-radius:4px;font-size:13px;"><span style="flex:1;cursor:pointer;" onclick="showItemDetail('${i.uid}')"><span style="color:${itemColor(i)};">${itemLabel(i)}</span> <small style="color:#888;">(${it.slot||''})</small><br><small style="color:#9aa;">${itemSummary(i)}</small></span><button onclick="unequipItem('${i.uid}')" style="padding:3px 8px;font-size:11px;background:#16213e;border:1px solid #444;color:#ccc;border-radius:3px;cursor:pointer;">Unequip</button></div>`; });
  html += '<div style="color:#aaa;font-size:12px;margin:10px 0 6px;">Bag:</div>';
  if (!bag.length) html += '<div style="color:#666;font-size:12px;">Empty</div>';
  bag.forEach(i => { const it = ITEMS[i.itemId]; let btns = '';
    if (it.slot) btns += `<button onclick="equipItem('${i.uid}')" style="padding:3px 8px;font-size:11px;background:#16213e;border:1px solid #444;color:#ccc;border-radius:3px;cursor:pointer;margin-left:4px;">Equip</button>`;
    if (it.type==='consumable') btns += `<button onclick="useItem('${i.uid}')" style="padding:3px 8px;font-size:11px;background:#16213e;border:1px solid #4a4;color:#8f8;border-radius:3px;cursor:pointer;margin-left:4px;">Use</button>`;
    btns += `<button onclick="sellItem('${i.uid}')" style="padding:3px 8px;font-size:11px;background:#16213e;border:1px solid #844;color:#f88;border-radius:3px;cursor:pointer;margin-left:4px;">Sell</button>`;
    html += `<div style="display:flex;align-items:center;gap:8px;padding:6px;margin:4px 0;background:#1a1a2e;border:1px solid ${isExcellent(i)?'#3a6a3a':'#333'};border-radius:4px;font-size:13px;"><span style="flex:1;cursor:pointer;" onclick="showItemDetail('${i.uid}')"><span style="color:${itemColor(i)};">${itemLabel(i)}</span> <small style="color:#888;">(${it.slot||it.type||''})</small><br><small style="color:#9aa;">${itemSummary(i)}</small></span>${btns}</div>`;
  });
  document.getElementById('panel-right').innerHTML = html;
}

function renderStats() {
  const c = G.char, needed = expForLevel(c.level), canAdd = c.statPts > 0;
  const st = computeStats(c, G.inv);
  const ab = (stat) => canAdd ? `<button onclick="addStat('${stat}')" style="background:#ffd700;color:#000;border:none;padding:2px 8px;border-radius:3px;cursor:pointer;font-size:11px;margin-left:6px;">+</button>` : '';
  document.getElementById('panel-right').innerHTML = `
    <h3 style="color:#ffd700;margin-bottom:12px;">Stats <button onclick="document.getElementById('panel-right').classList.add('hidden');currentPanel=null;" style="float:right;background:none;border:none;color:#888;cursor:pointer;font-size:18px;">✕</button></h3>
    <div style="color:#ffd700;text-align:center;margin:10px 0;font-size:13px;">Available Points: ${c.statPts}</div>
    <div style="display:flex;gap:8px;margin:8px 0;">
      <button onclick="toggleAutoAttack();renderStats();" style="flex:1;padding:8px;border-radius:4px;cursor:pointer;font-size:12px;border:1px solid ${G.autoAttack?'#6f6':'#444'};background:${G.autoAttack?'#1e3a1e':'#16213e'};color:${G.autoAttack?'#9f9':'#ccc'};">⚔️ Auto-Attack: ${G.autoAttack?'ON':'OFF'}</button>
      <button onclick="toggleAutoLevel();" style="flex:1;padding:8px;border-radius:4px;cursor:pointer;font-size:12px;border:1px solid ${G.autoLevel?'#6f6':'#444'};background:${G.autoLevel?'#1e3a1e':'#16213e'};color:${G.autoLevel?'#9f9':'#ccc'};">⬆️ Auto-Level: ${G.autoLevel?'ON':'OFF'}</button>
    </div>
    <div style="text-align:center;color:#888;font-size:11px;margin-bottom:4px;">${isRanged(c.cls)?'🏹 Ranged':'🗡️ Melee'} · Main stat: ${mainStatOf(c.cls).toUpperCase()} · Auto-Level adds to ${mainStatOf(c.cls).toUpperCase()}</div>
    <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #222;font-size:13px;"><span style="color:#aaa;">Level</span><span style="color:#fff;font-weight:bold;">${c.level}</span></div>
    <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #222;font-size:13px;"><span style="color:#aaa;">EXP</span><span style="color:#fff;">${c.exp}/${needed}</span></div>
    <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #222;font-size:13px;"><span style="color:#aaa;">Class</span><span style="color:#fff;">${CLASS_DATA[c.cls].name}</span></div>
    <hr style="border-color:#222;margin:8px 0;">
    <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #222;font-size:13px;"><span style="color:#aaa;">Strength</span><span style="color:#fff;font-weight:bold;">${c.str} ${ab('str')}</span></div>
    <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #222;font-size:13px;"><span style="color:#aaa;">Agility</span><span style="color:#fff;font-weight:bold;">${c.agi} ${ab('agi')}</span></div>
    <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #222;font-size:13px;"><span style="color:#aaa;">Vitality</span><span style="color:#fff;font-weight:bold;">${c.vit} ${ab('vit')}</span></div>
    <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #222;font-size:13px;"><span style="color:#aaa;">Energy</span><span style="color:#fff;font-weight:bold;">${c.ene} ${ab('ene')}</span></div>
    <hr style="border-color:#222;margin:8px 0;">
    <div style="color:#ffcc66;font-size:12px;margin-bottom:4px;">Combat</div>
    <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #222;font-size:13px;"><span style="color:#aaa;">Damage</span><span style="color:#fff;">${st.minDmg} - ${st.maxDmg}</span></div>
    <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #222;font-size:13px;"><span style="color:#aaa;">Defense</span><span style="color:#fff;">${st.defense} <small style="color:#7fae7f;">(AGI +${st.agiDef}${st.mainDef?', '+mainStatOf(c.cls).toUpperCase()+' +'+st.mainDef:''})</small></span></div>
    <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #222;font-size:13px;"><span style="color:#aaa;">Evade / Dodge</span><span style="color:#88ddff;">${(st.evade*100).toFixed(1)}% <small style="color:#5a8aa0;">(AGI)</small></span></div>
    <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #222;font-size:13px;"><span style="color:#aaa;">Critical</span><span style="color:#ff9a1f;">${(st.crit*100).toFixed(1)}%</span></div>
    <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #222;font-size:13px;"><span style="color:#aaa;">Lucky</span><span style="color:#5fd0ff;">${(st.luckChance*100).toFixed(1)}%</span></div>
    <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #222;font-size:13px;"><span style="color:#aaa;">Excellent</span><span style="color:#5dff7a;">${(st.excChance*100).toFixed(1)}%</span></div>
    ${st.dmgReduce?`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #222;font-size:13px;"><span style="color:#aaa;">Dmg Reduce</span><span style="color:#fff;">${(st.dmgReduce*100).toFixed(0)}%</span></div>`:''}
    <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #222;font-size:13px;"><span style="color:#aaa;">Atk Speed</span><span style="color:#fff;">${st.atkSpeed.toFixed(2)} <small style="color:#888;">${isRanged(c.cls)?'(ranged)':'(melee)'}</small></span></div>
    <hr style="border-color:#222;margin:8px 0;">
    <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #222;font-size:13px;"><span style="color:#aaa;">HP</span><span style="color:#fff;">${c.hp}/${st.maxHp||c.maxHp}${st.excHpPct?` <small style="color:#5dff7a;">(+${Math.round(st.excHpPct*100)}%)</small>`:''}</span></div>
    <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #222;font-size:13px;"><span style="color:#aaa;">MP</span><span style="color:#fff;">${c.mp}/${st.maxMp||c.maxMp}${st.excMpPct?` <small style="color:#5dff7a;">(+${Math.round(st.excMpPct*100)}%)</small>`:''}</span></div>
    <div style="display:flex;justify-content:space-between;padding:6px 0;font-size:13px;"><span style="color:#aaa;">Zen</span><span style="color:#ffcc00;">${c.zen.toLocaleString()}</span></div>
  `;
}

function addStat(stat) {
  if (G.char.statPts <= 0) return;
  G.char[stat]++;
  G.char.statPts--;
  const cd = CLASS_DATA[G.char.cls];
  if (stat === 'vit') G.char.maxHp = cd.baseHp + (G.char.vit - cd.baseVit) * cd.hpPerVit;
  if (stat === 'ene') G.char.maxMp = cd.baseMp + (G.char.ene - cd.baseEne) * cd.mpPerEne;
  gameLog(`+1 ${stat}!`,'system');
  renderStats(); updateUI(); saveGame();
}

function equipItem(uid) {
  const item = G.inv.find(i=>i.uid===uid);
  if (!item) return;
  const it = ITEMS[item.itemId];
  if (!it || !it.slot) return;
  // Unequip same slot
  G.inv.forEach(i => { if (i.equipped && ITEMS[i.itemId] && ITEMS[i.itemId].slot === it.slot) i.equipped = 0; });
  item.equipped = 1;
  gameLog(`Equipped ${it.name}`,'system');
  renderInventory(); saveGame();
}

function unequipItem(uid) {
  const item = G.inv.find(i=>i.uid===uid);
  if (item) item.equipped = 0;
  renderInventory(); saveGame();
}

function useItem(uid) {
  const idx = G.inv.findIndex(i=>i.uid===uid);
  if (idx < 0) return;
  const it = ITEMS[G.inv[idx].itemId];
  if (it.healHp) G.char.hp = Math.min(maxHpOf(G.char), G.char.hp + it.healHp);
  if (it.healMp) G.char.mp = Math.min(maxMpOf(G.char), G.char.mp + it.healMp);
  G.inv.splice(idx, 1);
  gameLog(`Used ${it.name}`,'system');
  renderInventory(); updateUI(); saveGame();
}

function sellItem(uid) {
  const idx = G.inv.findIndex(i=>i.uid===uid);
  if (idx < 0) return;
  const it = ITEMS[G.inv[idx].itemId];
  const price = Math.floor((it.price||100)/2);
  G.char.zen += price;
  G.inv.splice(idx, 1);
  gameLog(`Sold ${it.name} for ${price} Zen`,'loot');
  renderInventory(); updateUI(); saveGame();
}

function openShop(shopId, npcName) {
  const items = SHOPS[shopId];
  if (!items) { gameLog('Nothing to offer.','info'); return; }
  currentPanel = 'shop';
  const panel = document.getElementById('panel-right');
  panel.classList.remove('hidden');
  let html = `<h3 style="color:#ffd700;margin-bottom:12px;">${npcName} <button onclick="document.getElementById('panel-right').classList.add('hidden');currentPanel=null;" style="float:right;background:none;border:none;color:#888;cursor:pointer;font-size:18px;">✕</button></h3>`;
  items.forEach(itemId => { const it = ITEMS[itemId];
    html += `<div style="display:flex;align-items:center;gap:8px;padding:8px;margin:4px 0;background:#1a1a2e;border:1px solid #333;border-radius:4px;font-size:13px;">
      <span style="flex:1;cursor:pointer;" onclick="showShopDetail('${itemId}')">${it.name}<br><small style="color:#9aa;">${itemSummary({itemId})}</small><br><small style="color:#ffcc00;">💰 ${it.price} Zen</small></span>
      <button onclick="buyItem('${itemId}')" style="padding:4px 10px;background:#16213e;border:1px solid #ffd700;color:#ffd700;border-radius:3px;cursor:pointer;font-size:12px;">Buy</button>
    </div>`;
  });
  panel.innerHTML = html;
}

function buyItem(itemId) {
  const it = ITEMS[itemId];
  if (G.char.zen < it.price) { gameLog('Not enough Zen!','info'); return; }
  G.char.zen -= it.price;
  const uid = Date.now().toString(36)+Math.random().toString(36).slice(2,6);
  G.inv.push({uid, itemId, equipped:0});
  gameLog(`Bought ${it.name}!`,'loot');
  updateUI(); saveGame();
  openShop(Object.keys(SHOPS).find(k => SHOPS[k].includes(itemId)), '');
}

// ===== INIT =====
(function() {
  const session = Store.get('session');
  if (session) { currentUser = session; loadCharSelect(); }
})();
</script>
